<!DOCTYPE html>

    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        .map-container { height: 250px; border-radius: 16px; overflow: hidden; margin-bottom: 10px; background: #1e293b; }
        .last-pass { background: #1e293b; padding: 8px 12px; border-radius: 40px; text-align: center; font-size: 0.85rem; margin-top: 8px; }
        .panico-btn { background: #dc2626; width: 100%; padding: 12px; border: none; border-radius: 60px; font-weight: bold; color: white; cursor: pointer; margin-top: 12px; font-size: 1rem; }
        .timeline { display: flex; flex-wrap: wrap; gap: 8px; margin: 12px 0; }
        .timeline-item { background: #1e293b; padding: 6px 12px; border-radius: 30px; font-size: 0.8rem; flex: 1 0 auto; text-align: center; }
        .timeline-item.checked { background: #15803d; }
        .chat-messages { background: #0f172a; border-radius: 16px; padding: 10px; height: 160px; overflow-y: auto; margin-bottom: 10px; font-size: 0.85rem; }
        .msg { margin-bottom: 8px; padding: 6px 12px; background: #1e293b; border-radius: 20px; }
        .msg-user { background: #1e3a5f; text-align: right; }
        .chat-input { display: flex; gap: 8px; }

        .chat-input button { background: #facc15; border: none; border-radius: 40px; padding: 0 16px; font-weight: bold; cursor: pointer; }
        .mural-item { background: #0f172a; padding: 8px 12px; border-radius: 14px; margin-bottom: 8px; border-left: 3px solid #facc15; font-size: 0.85rem; }
        .auth-screen { max-width: 450px; margin: 30px auto; background: #111827; border-radius: 28px; padding: 1.5rem; }
        .auth-screen input, .auth-screen select { width: 100%; padding: 12px; margin: 8px 0; background: #1e293b; border: 1px solid #334155; border-radius: 20px; color: white; font-size: 1rem; }
        .auth-screen button { width: 100%; background: #facc15; border: none; padding: 12px; border-radius: 40px; font-weight: bold; font-size: 1rem; margin-top: 15px; cursor: pointer; color: #0f172a; }
        .toggle-auth { text-align: center; margin-top: 15px; color: #94a3b8; cursor: pointer; font-size: 0.85rem; }
        .hidden { display: none; }
        .rua-item { background: #1e293b; padding: 8px 12px; border-radius: 16px; margin-bottom: 8px; display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 8px; }
        .btn-passagem { background: #facc15; border: none; padding: 6px 14px; border-radius: 40px; font-weight: bold; cursor: pointer; font-size: 0.8rem; }
        .status-gps { font-size: 0.75rem; margin-top: 8px; padding: 6px 10px; border-radius: 16px; background: #1e293b; }
        .status-gps.erro { background: #7f1a1a; color: #fecaca; }
        .status-gps.ok { background: #14532d; color: #bbf7d0; }
        .info-gps { font-size: 0.8rem; margin-top: 8px; padding: 6px; background: #0f172a; border-radius: 12px; text-align: center; }
        .direcao-texto { font-weight: bold; color: #facc15; }
        .aviso-bg { background: #b45309; color: #ffedd5; padding: 8px; border-radius: 12px; font-size: 0.7rem; margin-top: 8px; text-align: center; }
        .select-modo { margin: 10px 0; display: flex; gap: 10px; }
        .select-modo button { background: #334155; padding: 6px; border: none; border-radius: 30px; flex: 1; cursor: pointer; color: white; }
        .select-modo button.ativo { background: #facc15; color: #0f172a; }
        button, .btn-passagem, .logout-btn, .panico-btn, .editar-btn { min-height: 44px; }
        footer { text-align: center; padding: 1rem; font-size: 0.7rem; color: #475569; border-top: 1px solid #1e293b; }
        /* Ícone da moto - AZUL COBALTO */
        .moto-marker { background: transparent; border: none; }
        .moto-marker i { font-size: 28px; color: #0047AB; text-shadow: 1px 1px 0 #000; }
        .seta-marker { background: transparent; border: none; }
        .seta-marker i { font-size: 20px; color: #ff8c00; text-shadow: 0 0 2px #000; }
        @media (min-width: 768px) {
            body { padding: 20px; }
            .dashboard { display: grid; grid-template-columns: repeat(2, 1fr); gap: 1.5rem; }
            .card-full { grid-column: span 2; }
            .map-container { height: 280px; }
        }
    </style>
</head>
<body>
<div id="appRoot"></div>

<script>
    // ========== CONFIGURAÇÃO DO FIREBASE ==========
    // COLE SUAS CREDENCIAIS AQUI (copiadas do console.firebase.google.com)
    const firebaseConfig = {
        apiKey: "SUA_API_KEY",
        authDomain: "SEU_PROJETO.firebaseapp.com",
        databaseURL: "https://SEU_PROJETO-default-rtdb.firebaseio.com",
        projectId: "SEU_PROJETO",
        storageBucket: "SEU_PROJETO.appspot.com",
        messagingSenderId: "SEU_SENDER_ID",
        appId: "SEU_APP_ID"
    };

    // Inicializar Firebase
    firebase.initializeApp(firebaseConfig);
    const database = firebase.database();
    const posicaoRef = database.ref('ronda/posicaoMotoqueiro');

    // ========== VARIÁVEIS GLOBAIS ==========
    let clientsDB = [];
    let motoqueiroDB = null;
    let watchId = null;
    let ultimoPontoSalvo = null;
    let ultimoEnvioPorAngulo = 0;
    let modoRastreamento = "inteligente";

    let currentUser = null;
    let clientUpdateInterval = null;
    let motoMap = null, motoMarker = null, clientMap = null, clientMarker = null, clientPolyline = null, clientSetaMarker = null;

    let geocodeCache = {};

    // ========== FUNÇÃO PARA CALCULAR DISTÂNCIA ENTRE DOIS PONTOS (Haversine) ==========
    function calcularDistancia(lat1, lon1, lat2, lon2) {
        const R = 6371000; // metros
        const dLat = (lat2 - lat1) * Math.PI / 180;
        const dLon = (lon2 - lon1) * Math.PI / 180;
        const a = Math.sin(dLat/2) * Math.sin(dLat/2) +
                  Math.cos(lat1 * Math.PI / 180) * Math.cos(lat2 * Math.PI / 180) *
                  Math.sin(dLon/2) * Math.sin(dLon/2);
        const c = 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
        return R * c;
    }

    // ========== FUNÇÃO PARA OBTER ENDEREÇO COMPLETO (RUA + NÚMERO) ==========
    async function obterEnderecoCompleto(lat, lng) {
        const chave = `${lat.toFixed(5)},${lng.toFixed(5)}`;
        if (geocodeCache[chave]) return geocodeCache[chave];
        try {
            const url = `https://nominatim.openstreetmap.org/reverse?format=json&lat=${lat}&lon=${lng}&zoom=18&addressdetails=1`;
            const response = await fetch(url);
            const data = await response.json();
            let endereco = "Endereço não identificado";
            if (data.address) {
                const rua = data.address.road || data.address.street || data.address.suburb || "";
                const numero = data.address.house_number || "";
                if (rua && numero) {
                    endereco = `${rua}, ${numero}`;
                } else if (rua) {
                    endereco = rua;
                } else if (data.address.city) {
                    endereco = data.address.city;
                } else {
                    endereco = "Localização aproximada";
                }
            }
            geocodeCache[chave] = endereco;
            const keys = Object.keys(geocodeCache);
            if (keys.length > 200) delete geocodeCache[keys[0]];
            return endereco;
        } catch (error) {
            console.error("Erro no reverse geocoding:", error);
            return "Rua não identificada";
        }
    }

    // ========== GEOCODING DO ENDEREÇO DO CLIENTE (para calcular proximidade) ==========
    async function geocodificarEndereco(endereco) {
        try {
            const url = `https://nominatim.openstreetmap.org/search?format=json&q=${encodeURIComponent(endereco)}&limit=1`;
            const response = await fetch(url);
            const data = await response.json();
            if (data && data.length > 0) {
                return { lat: parseFloat(data[0].lat), lng: parseFloat(data[0].lon) };
            }
        } catch (error) {
            console.error("Erro ao geocodificar endereço:", error);
        }
        return null;
    }

    // ========== FUNÇÕES AUXILIARES ==========
    function formatarDataHoraResumida(timestamp) {
        if (!timestamp) return "Nunca";
        const d = new Date(timestamp);
        return d.toLocaleString('pt-BR', { day: '2-digit', month: '2-digit', hour: '2-digit', minute: '2-digit' });
    }

    function formatarDataHoraCompleta(timestamp) {
        if (!timestamp) return "Nunca";
        const d = new Date(timestamp);
        return d.toLocaleString('pt-BR', { day: '2-digit', month: '2-digit', year: 'numeric', hour: '2-digit', minute: '2-digit', second: '2-digit' });
    }

    function calcularBearing(lat1, lng1, lat2, lng2) {
        const toRad = (deg) => deg * Math.PI / 180;
        const toDeg = (rad) => rad * 180 / Math.PI;
        const dLng = toRad(lng2 - lng1);
        const y = Math.sin(dLng) * Math.cos(toRad(lat2));
        const x = Math.cos(toRad(lat1)) * Math.sin(toRad(lat2)) - Math.sin(toRad(lat1)) * Math.cos(toRad(lat2)) * Math.cos(dLng);
        let bearing = toDeg(Math.atan2(y, x));
        return (bearing + 360) % 360;
    }

    function anguloParaDirecao(angulo) {
        const direcoes = ['Norte', 'Nordeste', 'Leste', 'Sudeste', 'Sul', 'Sudoeste', 'Oeste', 'Noroeste'];
        const idx = Math.round(angulo / 45) % 8;
        return direcoes[idx];
    }

    function deveSalvarPonto(novaLat, novaLng, novoTimestamp) {
        if (!ultimoPontoSalvo) return true;
        const diffTempo = (novoTimestamp - ultimoPontoSalvo.timestamp) / 1000;
        if (modoRastreamento === "tempo") return diffTempo >= 60;
        if (diffTempo >= 60) return true;
        if (novoTimestamp - ultimoEnvioPorAngulo < 10000) return false;
        const bearingAtual = calcularBearing(ultimoPontoSalvo.lat, ultimoPontoSalvo.lng, novaLat, novaLng);
        const ultimoBearing = ultimoPontoSalvo.bearing || 0;
        let diffAngulo = Math.abs(bearingAtual - ultimoBearing);
        diffAngulo = Math.min(diffAngulo, 360 - diffAngulo);
        if (diffAngulo > 15) {
            ultimoEnvioPorAngulo = novoTimestamp;
            return true;
        }
        return false;
    }

    function criarIconeMoto() {
        return L.divIcon({
            html: '<i class="fas fa-motorcycle"></i>',
            iconSize: [30, 30],
            className: 'moto-marker',
            popupAnchor: [0, -10]
        });
    }

    function criarIconeSeta(angulo) {
        return L.divIcon({
            html: `<i class="fas fa-long-arrow-alt-right" style="transform: rotate(${angulo}deg); display: inline-block;"></i>`,
            iconSize: [24, 24],
            className: 'seta-marker'
        });
    }

    // ========== RASTREAMENTO DO MOTOQUEIRO (Firebase) ==========
    function iniciarRastreamentoMoto() {
        if (!navigator.geolocation) {
            atualizarStatusGPS("Geolocalização não suportada.", false);
            return;
        }
        if (watchId !== null) return;
        atualizarStatusGPS("Iniciando GPS... (modo " + (modoRastreamento === "inteligente" ? "inteligente" : "econômico") + ")", false);
        watchId = navigator.geolocation.watchPosition(
            (position) => {
                const { latitude, longitude, accuracy, timestamp } = position.coords;
                const agora = Date.now();
                const salvar = deveSalvarPonto(latitude, longitude, agora);
                const posicaoObj = {
                    lat: latitude,
                    lng: longitude,
                    timestamp: agora,
                    accuracy: accuracy,
                    bearing: ultimoPontoSalvo ? calcularBearing(ultimoPontoSalvo.lat, ultimoPontoSalvo.lng, latitude, longitude) : 0
                };
                posicaoRef.set(posicaoObj);
                if (salvar) {
                    const ponto = {
                        lat: latitude,
                        lng: longitude,
                        timestamp: agora,
                        bearing: posicaoObj.bearing
                    };
                    if (!motoqueiroDB.pontosRota) motoqueiroDB.pontosRota = [];
                    motoqueiroDB.pontosRota.push(ponto);
                    if (motoqueiroDB.pontosRota.length > 500) motoqueiroDB.pontosRota.shift();
                    motoqueiroDB.localizacao = posicaoObj;
                    motoqueiroDB.rastreamentoAtivo = true;
                    ultimoPontoSalvo = { lat: latitude, lng: longitude, timestamp: agora, bearing: ponto.bearing };
                    atualizarStatusGPS(`Posição salva e enviada. Precisão: ${accuracy}m`, true);
                    if (currentUser && currentUser.type === 'moto' && motoMap) atualizarMapaMoto(latitude, longitude);
                } else {
                    motoqueiroDB.localizacao = posicaoObj;
                }
                localStorage.setItem("rondaMotoqueiro", JSON.stringify(motoqueiroDB));
            },
            (error) => {
                let msg = "";
                switch(error.code) {
                    case error.PERMISSION_DENIED: msg = "Permissão negada."; break;
                    case error.POSITION_UNAVAILABLE: msg = "Sinal GPS indisponível."; break;
                    case error.TIMEOUT: msg = "Tempo limite excedido."; break;
                    default: msg = "Erro desconhecido.";
                }
                atualizarStatusGPS(`Erro GPS: ${msg}`, false);
                if (motoqueiroDB) motoqueiroDB.rastreamentoAtivo = false;
            },
            { enableHighAccuracy: true, maximumAge: 0, timeout: 15000 }
        );
    }

    function pararRastreamentoMoto() {
        if (watchId !== null) {
            navigator.geolocation.clearWatch(watchId);
            watchId = null;
        }
        if (motoqueiroDB) motoqueiroDB.rastreamentoAtivo = false;
        atualizarStatusGPS("Rastreamento desativado.", false);
    }

    function atualizarStatusGPS(mensagem, isOk) {
        const statusDiv = document.getElementById("gpsStatus");
        if (statusDiv) {
            statusDiv.innerHTML = `<i class="fas ${isOk ? 'fa-check-circle' : 'fa-exclamation-triangle'}"></i> ${mensagem}`;
            statusDiv.className = `status-gps ${isOk ? 'ok' : 'erro'}`;
        }
        const infoDiv = document.getElementById("infoUltimaPosicao");
        if (infoDiv && motoqueiroDB && motoqueiroDB.localizacao) {
            const dataHora = formatarDataHoraResumida(motoqueiroDB.localizacao.timestamp);
            infoDiv.innerHTML = `<i class="fas fa-clock"></i> Última posição capturada: ${dataHora} | Precisão: ${motoqueiroDB.localizacao.accuracy || '?'}m | Pontos de rota: ${motoqueiroDB.pontosRota?.length || 0}`;
        }
    }

    function atualizarMapaMoto(lat, lng) {
        if (!motoMap) return;
        if (!motoMarker) {
            motoMarker = L.marker([lat, lng], { icon: criarIconeMoto() }).addTo(motoMap).bindPopup("Sua posição").openPopup();
        } else {
            motoMarker.setLatLng([lat, lng]);
        }
        motoMap.setView([lat, lng], 15);
        const infoDiv = document.getElementById("infoUltimaPosicao");
        if (infoDiv && motoqueiroDB && motoqueiroDB.localizacao) {
            const dataHora = formatarDataHoraResumida(motoqueiroDB.localizacao.timestamp);
            infoDiv.innerHTML = `<i class="fas fa-clock"></i> Última posição capturada: ${dataHora} | Precisão: ${motoqueiroDB.localizacao.accuracy || '?'}m | Pontos de rota: ${motoqueiroDB.pontosRota?.length || 0}`;
        }
    }

    // ========== AUTENTICAÇÃO (localStorage para clientes) ==========
    function loadDB() {
        const storedClients = localStorage.getItem("rondaClients");
        if(storedClients) {
            clientsDB = JSON.parse(storedClients);
        } else {
            clientsDB = [
                { id: "c1", nome: "Manoel Elias", telefone: "11999999999", endereco: "Manoel Elias de Castro, 471", senha: "123", ultimaPassagem: "23:03", chatMsgs: [{ from: "moto", text: "Ronda noturna ativa" }], muralPosts: [{ autor: "Anônimo", texto: "Tudo tranquilo", horario: "22/04 23:00" }], historicoRondas: ["22:00"], proximidades: [] }
            ];
            localStorage.setItem("rondaClients", JSON.stringify(clientsDB));
        }
        const storedMoto = localStorage.getItem("rondaMotoqueiro");
        if(storedMoto) {
            motoqueiroDB = JSON.parse(storedMoto);
        } else {
            motoqueiroDB = { 
                id: "m1", nome: "Alex Moto", senha: "123", 
                localizacao: { lat: -23.5505, lng: -46.6333, timestamp: Date.now() },
                historicoRondasFeitas: [], alertas: [], rastreamentoAtivo: false,
                pontosRota: []
            };
            localStorage.setItem("rondaMotoqueiro", JSON.stringify(motoqueiroDB));
        }
        if (!motoqueiroDB.pontosRota) motoqueiroDB.pontosRota = [];
        if (!motoqueiroDB.localizacao) motoqueiroDB.localizacao = { lat: -23.5505, lng: -46.6333, timestamp: Date.now() };
    }
    function saveDB() {
        localStorage.setItem("rondaClients", JSON.stringify(clientsDB));
        localStorage.setItem("rondaMotoqueiro", JSON.stringify(motoqueiroDB));
    }

    function renderAuthScreen() {
        const root = document.getElementById("appRoot");
        root.innerHTML = `
            <div class="auth-screen">
                <h2 style="text-align:center">Ronda Noturna</h2>
                <div style="display:flex; gap:10px; margin:20px 0;">
                    <button id="btnClienteLogin" style="flex:1;">Sou Cliente</button>
                    <button id="btnMotoLogin" style="flex:1;">Sou Motoqueiro</button>
                </div>
                <div id="loginFormCliente" class="hidden">
                    <input type="text" id="cliTelefone" placeholder="Telefone (ex: 11999999999)" />
                    <input type="password" id="cliSenha" placeholder="Senha" />
                    <button id="loginClienteBtn">Entrar</button>
                    <div class="toggle-auth" id="showRegCliente">Cadastrar cliente</div>
                </div>
                <div id="loginFormMoto" class="hidden">
                    <input type="text" id="motoNome" placeholder="Nome (Alex Moto)" />
                    <input type="password" id="motoSenha" placeholder="Senha (123)" />
                    <button id="loginMotoBtn">Entrar</button>
                    <div class="toggle-auth" id="showRegMoto">Cadastrar motoqueiro</div>
                </div>
                <div id="regCliente" class="hidden">
                    <input type="text" id="regNome" placeholder="Nome" />
                    <input type="text" id="regTelefone" placeholder="Telefone" />
                    <input type="text" id="regEndereco" placeholder="Endereço (rua, número)" />
                    <input type="password" id="regSenha" placeholder="Senha" />
                    <button id="cadastrarClienteBtn">Cadastrar</button>
                    <div class="toggle-auth" id="backToLoginCliente">Voltar</div>
                </div>
                <div id="regMoto" class="hidden">
                    <input type="text" id="motoRegNome" placeholder="Nome" />
                    <input type="password" id="motoRegSenha" placeholder="Senha" />
                    <button id="cadastrarMotoBtn">Cadastrar</button>
                    <div class="toggle-auth" id="backToLoginMoto">Voltar</div>
                </div>
            </div>
        `;
        function showLogin(tipo) {
            document.getElementById("loginFormCliente").classList.toggle("hidden", tipo !== "cliente");
            document.getElementById("loginFormMoto").classList.toggle("hidden", tipo !== "moto");
            document.getElementById("regCliente").classList.add("hidden");
            document.getElementById("regMoto").classList.add("hidden");
        }
        function showRegister(tipo) {
            if(tipo === "cliente") {
                document.getElementById("loginFormCliente").classList.add("hidden");
                document.getElementById("regCliente").classList.remove("hidden");
            } else {
                document.getElementById("loginFormMoto").classList.add("hidden");
                document.getElementById("regMoto").classList.remove("hidden");
            }
        }
        document.getElementById("btnClienteLogin").onclick = () => showLogin("cliente");
        document.getElementById("btnMotoLogin").onclick = () => showLogin("moto");
        document.getElementById("loginClienteBtn").onclick = () => {
            const tel = document.getElementById("cliTelefone").value.trim();
            const senha = document.getElementById("cliSenha").value;
            const client = clientsDB.find(c => c.telefone === tel && c.senha === senha);
            if(client) { currentUser = { type: "client", data: client }; renderDashboardCliente(client); }
            else alert("Cliente não encontrado. Use 11999999999 / 123 ou cadastre-se.");
        };
        document.getElementById("loginMotoBtn").onclick = () => {
            const nome = document.getElementById("motoNome").value.trim();
            const senha = document.getElementById("motoSenha").value;
            if(motoqueiroDB && motoqueiroDB.nome === nome && motoqueiroDB.senha === senha) {
                currentUser = { type: "moto", data: motoqueiroDB };
                renderDashboardMoto(motoqueiroDB);
            } else alert("Motoqueiro não encontrado. Use Alex Moto / 123");
        };
        document.getElementById("showRegCliente").onclick = () => showRegister("cliente");
        document.getElementById("showRegMoto").onclick = () => showRegister("moto");
        document.getElementById("cadastrarClienteBtn").onclick = () => {
            const nome = document.getElementById("regNome").value.trim();
            const tel = document.getElementById("regTelefone").value.trim();
            const end = document.getElementById("regEndereco").value.trim();
            const senha = document.getElementById("regSenha").value;
            if(!nome || !tel || !end || !senha) return alert("Preencha todos");
            if(clientsDB.find(c => c.telefone === tel)) return alert("Telefone já existe");
            const novo = { id: Date.now().toString(), nome, telefone: tel, endereco: end, senha, ultimaPassagem: "Nenhuma", chatMsgs: [{ from: "moto", text: "Bem-vindo!" }], muralPosts: [], historicoRondas: [], proximidades: [] };
            clientsDB.push(novo);
            saveDB();
            alert("Cadastrado! Faça login.");
            showLogin("cliente");
        };
        document.getElementById("cadastrarMotoBtn").onclick = () => {
            const nome = document.getElementById("motoRegNome").value.trim();
            const senha = document.getElementById("motoRegSenha").value;
            if(!nome || !senha) return;
            motoqueiroDB = { id: "m1", nome, senha, localizacao: { lat: -23.5505, lng: -46.6333, timestamp: Date.now() }, historicoRondasFeitas: [], alertas: [], rastreamentoAtivo: false, pontosRota: [] };
            saveDB();
            alert("Motoqueiro cadastrado! Faça login.");
            showLogin("moto");
        };
        document.getElementById("backToLoginCliente").onclick = () => showLogin("cliente");
        document.getElementById("backToLoginMoto").onclick = () => showLogin("moto");
    }

    // ========== DASHBOARD CLIENTE (com histórico de proximidade e cor verde da rota) ==========
    function renderDashboardCliente(client) {
        if(clientUpdateInterval) clearInterval(clientUpdateInterval);
        const root = document.getElementById("appRoot");
        const horas = ["22h","23h","00h","01h","02h","03h","04h","05h"];
        const rondasFeitas = client.historicoRondas || [];
        // Garantir que o cliente tenha um array de proximidades
        if (!client.proximidades) client.proximidades = [];
        
        root.innerHTML = `
            <div class="app-container">
                <div class="header">
                    <div class="logo"><h1><i class="fas fa-motorcycle"></i> Ronda Noturna</h1></div>
                    <div class="user-info">
                        <i class="fas fa-user"></i> ${client.nome}
                        <span style="font-size:12px;"><i class="fas fa-location-dot"></i> <span id="enderecoCliente">${client.endereco}</span></span>
                        <button class="editar-btn" id="editarEnderecoBtn"><i class="fas fa-edit"></i> Editar</button>
                        <button class="logout-btn" id="logoutBtn">Sair</button>
                    </div>
                </div>
                <div class="dashboard">
                    <div class="card">
                        <h3><i class="fas fa-map-marked-alt"></i> Localização do Motoqueiro</h3>
                        <div id="clienteMapContainer" class="map-container"></div>
                        <div class="last-pass" id="ultimaAtualizacaoGPS">Aguardando posição...</div>
                        <button class="panico-btn" id="panicoBtn"><i class="fas fa-bell"></i> Pânico - Acionar Motoqueiro</button>
                    </div>
                    <div class="card">
                        <h3><i class="fas fa-clock"></i> Rondas da noite (hora em hora)</h3>
                        <div class="timeline">
                            ${horas.map(h => `<div class="timeline-item ${rondasFeitas.some(r => r.includes(h)) ? 'checked' : ''}">${h} ${rondasFeitas.some(r => r.includes(h)) ? '✓' : '○'}</div>`).join('')}
                        </div>
                    </div>
                    <div class="card">
                        <h3><i class="fas fa-history"></i> Histórico de Proximidade</h3>
                        <div id="historicoProximidade" style="max-height: 150px; overflow-y: auto; font-size: 0.8rem;">
                            ${client.proximidades.length === 0 ? "<p>Nenhuma passagem próxima registrada ainda.</p>" : client.proximidades.map(p => `<div><i class="fas fa-motorcycle" style="color:#0047AB;"></i> ${p}</div>`).join('')}
                        </div>
                        <div style="margin-top:8px;"><strong>Total de passagens próximas:</strong> ${client.proximidades.length}</div>
                    </div>
                    <div class="card">
                        <h3><i class="fas fa-comment"></i> Chat com a central</h3>
                        <div class="chat-messages" id="chatMsgsArea">${client.chatMsgs.map(m => `<div class="msg ${m.from === 'client' ? 'msg-user' : ''}"><strong>${m.from === 'client' ? 'Você' : 'Motoqueiro'}:</strong> ${m.text}</div>`).join('')}</div>
                        <div class="chat-input"><input type="text" id="chatInput" placeholder="Mensagem..."/><button id="sendChat"><i class="fas fa-paper-plane"></i></button></div>
                    </div>
                    <div class="card card-full">
                        <h3><i class="fas fa-users"></i> Mural da vizinhança</h3>
                        <div id="muralList">${(client.muralPosts || []).map(p => `<div class="mural-item"><i class="fas fa-comment-dots"></i> <strong>${p.autor}:</strong> ${p.texto} <span style="font-size:0.7rem;">- ${p.horario}</span></div>`).join('')}</div>
                        <div style="display:flex; gap:8px; margin-top:12px;"><input type="text" id="novoPost" placeholder="Alerta anônimo..." style="flex:1; background:#1e293b; border:none; padding:10px; border-radius:40px;"><button id="postMuralBtn"><i class="fas fa-plus"></i> Postar</button></div>
                    </div>
                </div>
                <footer>Posição do motoqueiro em tempo real. Proximidade considerada até 50 metros do seu endereço.</footer>
            </div>
        `;

        if(clientMap) clientMap.remove();
        clientMap = L.map("clienteMapContainer").setView([-23.5505, -46.6333], 13);
        L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png', { attribution: '&copy; OSM' }).addTo(clientMap);
        clientMarker = L.marker([-23.5505, -46.6333], { icon: criarIconeMoto() }).addTo(clientMap).bindPopup("Motoqueiro");

        // Geocodificar endereço do cliente para calcular proximidade
        let clienteLatLng = null;
        geocodificarEndereco(client.endereco).then(coord => {
            if (coord) {
                clienteLatLng = coord;
                // Adicionar marcador da casa do cliente no mapa (opcional)
                L.marker([coord.lat, coord.lng], { icon: L.divIcon({ html: '<i class="fas fa-home" style="font-size:20px; color:#fff;"></i>', className: 'home-marker', iconSize: [24,24] }) }).addTo(clientMap).bindPopup("Sua residência");
            } else {
                console.warn("Não foi possível geocodificar o endereço do cliente.");
            }
        });

        // Variável para evitar registrar a mesma passagem múltiplas vezes seguidas
        let ultimoRegistroProximidade = 0;

        posicaoRef.on('value', async (snapshot) => {
            const posicao = snapshot.val();
            if (posicao && posicao.lat && posicao.lng) {
                const { lat, lng, timestamp, bearing } = posicao;
                clientMarker.setLatLng([lat, lng]);
                clientMap.setView([lat, lng], 14);
                
                // Obter endereço completo
                let enderecoCompleto = await obterEnderecoCompleto(lat, lng);
                let direcao = "Desconhecida";
                if (bearing !== undefined) {
                    direcao = anguloParaDirecao(bearing);
                }
                const dataHora = formatarDataHoraResumida(timestamp);
                document.getElementById("ultimaAtualizacaoGPS").innerHTML = `
                    <i class="fas fa-road"></i> <strong>Endereço aproximado:</strong> ${enderecoCompleto}<br>
                    <i class="fas fa-compass"></i> <strong>Direção:</strong> <span class="direcao-texto">${direcao}</span><br>
                    <i class="fas fa-clock"></i> <strong>Atualizado:</strong> ${dataHora}
                `;

                // Verificar proximidade com o endereço do cliente (se já tiver as coordenadas)
                if (clienteLatLng) {
                    const distancia = calcularDistancia(lat, lng, clienteLatLng.lat, clienteLatLng.lng);
                    // Se estiver a menos de 50 metros e já tiver passado pelo menos 60 segundos desde o último registro
                    if (distancia <= 50 && (timestamp - ultimoRegistroProximidade > 60000)) {
                        ultimoRegistroProximidade = timestamp;
                        const dataHoraCompleta = formatarDataHoraCompleta(timestamp);
                        client.proximidades.unshift(`Passagem próxima em ${dataHoraCompleta} (distância ${Math.round(distancia)}m)`);
                        // Manter apenas as últimas 50 ocorrências
                        if (client.proximidades.length > 50) client.proximidades.pop();
                        // Atualizar localStorage
                        const idx = clientsDB.findIndex(c => c.id === client.id);
                        if (idx !== -1) clientsDB[idx] = client;
                        saveDB();
                        // Atualizar a lista na tela
                        const historicoDiv = document.getElementById("historicoProximidade");
                        if (historicoDiv) {
                            historicoDiv.innerHTML = client.proximidades.map(p => `<div><i class="fas fa-motorcycle" style="color:#0047AB;"></i> ${p}</div>`).join('');
                            document.querySelector("#historicoProximidade + div strong").nextSibling.textContent = ` ${client.proximidades.length}`;
                        }
                    }
                }
            } else {
                document.getElementById("ultimaAtualizacaoGPS").innerHTML = "<i class='fas fa-exclamation-triangle'></i> Nenhuma posição recebida. O motoqueiro ainda não iniciou o rastreamento.";
            }
        });

        // Desenhar rota (polyline) na cor verde
        function desenharRota(pontos) {
            if (clientPolyline) clientPolyline.remove();
            if (pontos.length >= 2) {
                const latlngs = pontos.map(p => [p.lat, p.lng]);
                clientPolyline = L.polyline(latlngs, { color: '#22c55e', weight: 4, opacity: 0.7 }).addTo(clientMap);
                // Seta na ponta (se houver pelo menos 2 pontos)
                if (pontos.length >= 2) {
                    if (clientSetaMarker) clientSetaMarker.remove();
                    const ultimo = pontos[pontos.length-1];
                    const penultimo = pontos[pontos.length-2];
                    const angulo = calcularBearing(penultimo.lat, penultimo.lng, ultimo.lat, ultimo.lng);
                    const setaIcon = criarIconeSeta(angulo);
                    clientSetaMarker = L.marker([ultimo.lat, ultimo.lng], { icon: setaIcon }).addTo(clientMap);
                }
            }
        }

        // Escutar atualizações da rota (pontosRota) do Firebase? Como os pontos estão apenas no localStorage do motoqueiro,
        // para simplificar, vamos buscar os pontos periodicamente do localStorage.
        // Mas como a posição já vem do Firebase, podemos também sincronizar os pontos via Firebase.
        // Para este exemplo, vamos apenas desenhar a rota com base nos pontos locais do motoqueiro (que estão no localStorage).
        // Para manter sincronia, o ideal seria também enviar pontos para o Firebase, mas isso aumentaria a complexidade.
        // Por ora, o cliente só desenha a rota quando atualiza o mapa, usando os pontos do motoqueiro que estão no localStorage (acessado via loadDB).
        // Vamos modificar o listener do Firebase para também atualizar a rota periodicamente.
        const intervalRota = setInterval(() => {
            loadDB();
            const moto = motoqueiroDB;
            if (moto && moto.pontosRota && moto.pontosRota.length > 1) {
                desenharRota(moto.pontosRota);
            }
        }, 5000);
        clientUpdateInterval = intervalRota;

        // Eventos
        document.getElementById("editarEnderecoBtn").onclick = () => {
            const novoEnd = prompt("Digite seu endereço completo:", client.endereco);
            if (novoEnd && novoEnd.trim() !== "") {
                client.endereco = novoEnd.trim();
                const idx = clientsDB.findIndex(c => c.id === client.id);
                if (idx !== -1) clientsDB[idx] = client;
                saveDB();
                document.getElementById("enderecoCliente").innerText = client.endereco;
                alert("Endereço atualizado! A geolocalização será refeita.");
                // Re-geocodificar
                geocodificarEndereco(client.endereco).then(coord => { clienteLatLng = coord; });
            }
        };
        document.getElementById("logoutBtn").onclick = () => { if(clientUpdateInterval) clearInterval(clientUpdateInterval); currentUser = null; renderAuthScreen(); };
        document.getElementById("panicoBtn").onclick = () => {
            alert("Pânico acionado! O motoqueiro foi notificado.");
            if(motoqueiroDB) {
                if(!motoqueiroDB.alertas) motoqueiroDB.alertas = [];
                motoqueiroDB.alertas.push({ cliente: client.nome, endereco: client.endereco, horario: new Date().toLocaleTimeString() });
                saveDB();
            }
        };
        document.getElementById("sendChat").onclick = () => {
            const texto = document.getElementById("chatInput").value.trim();
            if(texto) {
                client.chatMsgs.push({ from: "client", text: texto });
                saveDB();
                renderDashboardCliente(client);
            }
        };
        document.getElementById("postMuralBtn").onclick = () => {
            const novo = document.getElementById("novoPost").value.trim();
            if(novo) {
                if(!client.muralPosts) client.muralPosts = [];
                client.muralPosts.unshift({ autor: "Anônimo", texto: novo, horario: new Date().toLocaleTimeString() });
                saveDB();
                renderDashboardCliente(client);
            }
        };
    }

    // ========== DASHBOARD MOTOQUEIRO (com rota na cor verde e ícone azul cobalto) ==========
    function renderDashboardMoto(moto) {
        if(clientUpdateInterval) clearInterval(clientUpdateInterval);
        loadDB();
        const ruas = [...new Set(clientsDB.map(c => c.endereco))];
        const root = document.getElementById("appRoot");
        root.innerHTML = `
            <div class="app-container">
                <div class="header">
                    <div class="logo"><h1><i class="fas fa-motorcycle"></i> Painel Motoqueiro</h1></div>
                    <div class="user-info"><i class="fas fa-user-astronaut"></i> ${moto.nome}<button class="logout-btn" id="logoutMotoBtn">Sair</button></div>
                </div>
                <div class="dashboard">
                    <div class="card">
                        <h3><i class="fas fa-satellite-dish"></i> Rastreamento Inteligente</h3>
                        <div id="motoMapContainer" class="map-container"></div>
                        <div id="gpsStatus" class="status-gps erro">Inicializando...</div>
                        <div id="infoUltimaPosicao" class="info-gps"><i class="fas fa-clock"></i> Aguardando primeira posição...</div>
                        <div class="select-modo">
                            <button id="modoTempoBtn" class="${modoRastreamento === 'tempo' ? 'ativo' : ''}">Apenas tempo (60s)</button>
                            <button id="modoInteligenteBtn" class="${modoRastreamento === 'inteligente' ? 'ativo' : ''}">Inteligente (tempo + ângulo)</button>
                        </div>
                        <div class="aviso-bg"><i class="fas fa-info-circle"></i> Modo inteligente: salva posição a cada 60s OU quando mudar direção >15°.</div>
                        <div style="display:flex; gap:10px; margin-top:8px;">
                            <button id="pararRastreamentoBtn" style="background:#ef4444; flex:1;">Desativar GPS</button>
                            <button id="reiniciarRastreamentoBtn" style="background:#22c55e; flex:1;">Ativar GPS</button>
                        </div>
                    </div>
                    <div class="card">
                        <h3><i class="fas fa-road"></i> Registrar passagem por rua</h3>
                        <div id="listaRuas">${ruas.length === 0 ? "<p>Nenhum cliente cadastrado ainda.</p>" : ruas.map(rua => `<div class="rua-item"><span><i class="fas fa-location-dot"></i> ${rua}</span><button class="btn-passagem" data-rua="${rua}">Passei agora</button></div>`).join('')}</div>
                    </div>
                    <div class="card">
                        <h3><i class="fas fa-bell"></i> Alertas de pânico</h3>
                        <div id="alertasPanico">${moto.alertas?.length ? moto.alertas.map(a => `<div class="mural-item" style="border-left-color:red;"><i class="fas fa-exclamation-circle"></i> ${a.cliente} - ${a.endereco} às ${a.horario} <button class="responderAlerta" data-end="${a.endereco}" style="margin-left:10px;">Atender</button></div>`).join('') : "<p>Nenhum alerta</p>"}</div>
                    </div>
                    <div class="card card-full">
                        <h3><i class="fas fa-history"></i> Histórico de rondas e pontos de rota</h3>
                        <div id="historicoMoto">${moto.historicoRondasFeitas?.map(h => `<div><i class="fas fa-check-circle"></i> ${h}</div>`).join('') || "Nenhuma ronda registrada"}</div>
                        <div style="margin-top:10px;"><strong>Pontos salvos na rota:</strong> ${moto.pontosRota?.length || 0}</div>
                    </div>
                </div>
                <footer>GPS ativo em primeiro plano. Sua posição é enviada para todos os clientes em tempo real.</footer>
            </div>
        `;
        if(motoMap) motoMap.remove();
        const { lat, lng } = moto.localizacao;
        motoMap = L.map("motoMapContainer").setView([lat, lng], 15);
        L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png').addTo(motoMap);
        motoMarker = L.marker([lat, lng], { icon: criarIconeMoto() }).addTo(motoMap).bindPopup("Sua posição");
        if (moto.pontosRota && moto.pontosRota.length > 1) {
            const pontosLatLng = moto.pontosRota.map(p => [p.lat, p.lng]);
            L.polyline(pontosLatLng, { color: '#22c55e', weight: 3 }).addTo(motoMap);
        }
        if (moto.localizacao && moto.localizacao.timestamp) {
            const dataHora = formatarDataHoraResumida(moto.localizacao.timestamp);
            document.getElementById("infoUltimaPosicao").innerHTML = `<i class="fas fa-clock"></i> Última posição capturada: ${dataHora} | Precisão: ${moto.localizacao.accuracy || '?'}m | Pontos de rota: ${moto.pontosRota?.length || 0}`;
        }
        document.getElementById("modoTempoBtn").onclick = () => {
            modoRastreamento = "tempo";
            if (watchId) { pararRastreamentoMoto(); iniciarRastreamentoMoto(); }
            renderDashboardMoto(moto);
        };
        document.getElementById("modoInteligenteBtn").onclick = () => {
            modoRastreamento = "inteligente";
            if (watchId) { pararRastreamentoMoto(); iniciarRastreamentoMoto(); }
            renderDashboardMoto(moto);
        };
        document.getElementById("pararRastreamentoBtn").onclick = () => pararRastreamentoMoto();
        document.getElementById("reiniciarRastreamentoBtn").onclick = () => { pararRastreamentoMoto(); iniciarRastreamentoMoto(); };
        document.getElementById("logoutMotoBtn").onclick = () => { pararRastreamentoMoto(); currentUser = null; renderAuthScreen(); };
        document.querySelectorAll(".btn-passagem").forEach(btn => {
            btn.onclick = () => {
                const rua = btn.getAttribute("data-rua");
                const agora = new Date().toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'});
                moto.historicoRondasFeitas.unshift(`${rua} às ${agora}`);
                clientsDB.forEach(c => { if(c.endereco === rua) { c.ultimaPassagem = `${agora}`; if(!c.historicoRondas) c.historicoRondas = []; c.historicoRondas.unshift(`${agora}`); } });
                saveDB();
                renderDashboardMoto(moto);
            };
        });
        document.querySelectorAll(".responderAlerta").forEach(btn => {
            btn.onclick = () => {
                const end = btn.getAttribute("data-end");
                alert(`Atendendo alerta em ${end}`);
                moto.alertas = moto.alertas.filter(a => a.endereco !== end);
                saveDB();
                renderDashboardMoto(moto);
            };
        });
        if (!watchId && moto.rastreamentoAtivo !== false) iniciarRastreamentoMoto();
    }

    loadDB();
    renderAuthScreen();
</script>
</body>
</html>
