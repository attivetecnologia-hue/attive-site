<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Ronda Noturna - Rastreamento GPS</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <style>
        /* Mesmos estilos do anterior, compactado para brevidade */
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Inter', sans-serif; background: #0a0f1e; color: #eef2ff; padding: 20px; }
        .app-container { max-width: 1400px; margin: 0 auto; background: #0f172a; border-radius: 32px; overflow: hidden; border: 1px solid #1e293b; }
        .header { background: #020617; padding: 1rem 2rem; display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 15px; border-bottom: 1px solid #1e293b; }
        .logo h1 { font-size: 1.6rem; background: linear-gradient(135deg, #facc15, #ff8c00); -webkit-background-clip: text; background-clip: text; color: transparent; }
        .user-info { display: flex; align-items: center; gap: 15px; background: #1e293b; padding: 8px 18px; border-radius: 60px; }
        .logout-btn { background: none; border: 1px solid #ef4444; color: #fecaca; padding: 6px 14px; border-radius: 40px; cursor: pointer; }
        .dashboard { display: grid; grid-template-columns: repeat(auto-fit, minmax(380px, 1fr)); gap: 1.5rem; padding: 2rem; }
        .card { background: #111827; border-radius: 24px; padding: 1.2rem 1.5rem; border: 1px solid #1f2a44; }
        .card-full { grid-column: 1 / -1; }
        .card h3 { font-size: 1.25rem; margin-bottom: 1rem; border-left: 4px solid #facc15; padding-left: 12px; }
        .map-container { height: 300px; border-radius: 20px; overflow: hidden; margin-bottom: 12px; background: #1e293b; }
        .last-pass { background: #1e293b; padding: 8px 12px; border-radius: 40px; text-align: center; margin-top: 8px; }
        .panico-btn { background: #dc2626; width: 100%; padding: 14px; border: none; border-radius: 60px; font-weight: bold; color: white; cursor: pointer; margin-top: 15px; }
        .timeline { display: flex; flex-wrap: wrap; gap: 8px; margin: 15px 0; }
        .timeline-item { background: #1e293b; padding: 6px 12px; border-radius: 40px; font-size: 0.9rem; flex: 1; text-align: center; }
        .timeline-item.checked { background: #15803d; }
        .chat-messages { background: #0f172a; border-radius: 20px; padding: 12px; height: 160px; overflow-y: auto; margin-bottom: 12px; }
        .msg { margin-bottom: 8px; padding: 6px 12px; background: #1e293b; border-radius: 20px; }
        .msg-user { background: #1e3a5f; text-align: right; }
        .chat-input { display: flex; gap: 8px; }
        .chat-input input { flex: 1; padding: 10px; border-radius: 40px; border: none; background: #1e293b; color: white; }
        .chat-input button { background: #facc15; border: none; border-radius: 40px; padding: 0 18px; cursor: pointer; }
        .mural-item { background: #0f172a; padding: 10px; border-radius: 16px; margin-bottom: 8px; border-left: 3px solid #facc15; }
        .auth-screen { max-width: 500px; margin: 40px auto; background: #111827; border-radius: 32px; padding: 2rem; }
        .auth-screen input, .auth-screen select { width: 100%; padding: 12px; margin: 8px 0; background: #1e293b; border: 1px solid #334155; border-radius: 20px; color: white; }
        .auth-screen button { width: 100%; background: #facc15; border: none; padding: 12px; border-radius: 40px; font-weight: bold; margin-top: 15px; cursor: pointer; }
        .toggle-auth { text-align: center; margin-top: 15px; color: #94a3b8; cursor: pointer; }
        .hidden { display: none; }
        .rua-item { background: #1e293b; padding: 10px; border-radius: 16px; margin-bottom: 10px; display: flex; justify-content: space-between; align-items: center; }
        .btn-passagem { background: #facc15; border: none; padding: 6px 12px; border-radius: 40px; font-weight: bold; cursor: pointer; }
        .status-gps { font-size: 0.8rem; margin-top: 8px; padding: 8px; border-radius: 20px; }
        .status-gps.erro { background: #7f1a1a; color: #fecaca; }
        .status-gps.ok { background: #14532d; color: #bbf7d0; }
        footer { text-align: center; padding: 1.5rem; font-size: 0.75rem; color: #475569; border-top: 1px solid #1e293b; }
        button { cursor: pointer; }
    </style>
</head>
<body>
<div id="appRoot"></div>

<script>
    // ----- BANCO DE DADOS SIMULADO -----
    let clientsDB = [];
    let motoqueiroDB = null;
    let watchId = null;
    let geoError = null;

    function loadDB() {
        const storedClients = localStorage.getItem("rondaClients");
        if(storedClients) clientsDB = JSON.parse(storedClients);
        else {
            clientsDB = [
                { id: "c1", nome: "Carlos Souza", telefone: "11999999999", endereco: "Rua das Acácias, 123", senha: "123", ultimaPassagem: "23:03 (há 12 min)", chatMsgs: [{ from: "moto", text: "Ronda noturna ativa" }], muralPosts: [{ autor: "Anônimo", texto: "Tudo tranquilo", horario: "22/04 23:00" }], historicoRondas: ["22:00 ✅"] }
            ];
            localStorage.setItem("rondaClients", JSON.stringify(clientsDB));
        }
        const storedMoto = localStorage.getItem("rondaMotoqueiro");
        if(storedMoto) motoqueiroDB = JSON.parse(storedMoto);
        else {
            motoqueiroDB = { 
                id: "m1", nome: "Alex Moto", senha: "123", 
                localizacao: { lat: -23.5505, lng: -46.6333, timestamp: Date.now() },
                historicoRondasFeitas: [], alertas: [], rastreamentoAtivo: false
            };
            localStorage.setItem("rondaMotoqueiro", JSON.stringify(motoqueiroDB));
        }
    }
    function saveDB() { localStorage.setItem("rondaClients", JSON.stringify(clientsDB)); localStorage.setItem("rondaMotoqueiro", JSON.stringify(motoqueiroDB)); }

    let currentUser = null;
    let clientUpdateInterval = null;
    let motoMap = null, motoMarker = null;
    let clientMap = null, clientMarker = null;

    // RASTREAMENTO MOTOQUEIRO (melhorado)
    function iniciarRastreamentoMoto() {
        if (!navigator.geolocation) {
            geoError = "Geolocalização não suportada neste navegador.";
            atualizarStatusGPSMoto(geoError, false);
            return;
        }
        if (watchId !== null) return;
        geoError = null;
        atualizarStatusGPSMoto("Solicitando permissão de localização...", false);
        watchId = navigator.geolocation.watchPosition(
            (position) => {
                const { latitude, longitude, accuracy } = position.coords;
                motoqueiroDB.localizacao = { lat: latitude, lng: longitude, timestamp: Date.now(), accuracy };
                motoqueiroDB.rastreamentoAtivo = true;
                saveDB();
                atualizarStatusGPSMoto(`✅ GPS ativo (precisão ~${accuracy}m)`, true);
                if (currentUser && currentUser.type === 'moto' && motoMap) {
                    atualizarMapaMoto(latitude, longitude);
                }
            },
            (error) => {
                console.error("Erro GPS:", error);
                let msg = "";
                switch(error.code) {
                    case error.PERMISSION_DENIED: msg = "Permissão de localização negada. Habilite nas configurações do navegador."; break;
                    case error.POSITION_UNAVAILABLE: msg = "Posição indisponível. Verifique se o GPS do celular está ativo."; break;
                    case error.TIMEOUT: msg = "Tempo limite excedido. Tente novamente em local aberto."; break;
                    default: msg = "Erro desconhecido ao obter localização.";
                }
                geoError = msg;
                atualizarStatusGPSMoto(`❌ ${msg}`, false);
                motoqueiroDB.rastreamentoAtivo = false;
                saveDB();
                if (watchId) { navigator.geolocation.clearWatch(watchId); watchId = null; }
            },
            { enableHighAccuracy: true, maximumAge: 5000, timeout: 15000 }
        );
    }

    function pararRastreamentoMoto() {
        if (watchId !== null) {
            navigator.geolocation.clearWatch(watchId);
            watchId = null;
        }
        motoqueiroDB.rastreamentoAtivo = false;
        saveDB();
        atualizarStatusGPSMoto("⏹️ Rastreamento desativado manualmente.", false);
    }

    function atualizarStatusGPSMoto(mensagem, isOk) {
        const statusDiv = document.getElementById("gpsStatus");
        if (statusDiv) {
            statusDiv.innerHTML = mensagem;
            statusDiv.className = `status-gps ${isOk ? 'ok' : 'erro'}`;
        }
    }

    function atualizarMapaMoto(lat, lng) {
        if (!motoMap) return;
        if (!motoMarker) motoMarker = L.marker([lat, lng]).addTo(motoMap).bindPopup("Você está aqui").openPopup();
        else motoMarker.setLatLng([lat, lng]);
        motoMap.setView([lat, lng], 15);
    }

    // TELA DE AUTENTICAÇÃO (idêntica à anterior, mas mantida)
    function renderAuthScreen() {
        const root = document.getElementById("appRoot");
        root.innerHTML = `
            <div class="auth-screen">
                <h2 style="text-align:center">🚨 Ronda Noturna</h2>
                <div style="display:flex; gap:10px; margin:20px 0;">
                    <button id="btnClienteLogin" style="flex:1; background:#facc15;">Sou Cliente</button>
                    <button id="btnMotoLogin" style="flex:1; background:#3b82f6;">Sou Motoqueiro</button>
                </div>
                <div id="loginFormCliente" class="hidden">
                    <input type="text" id="cliTelefone" placeholder="Telefone (ex: 11999999999)" />
                    <input type="password" id="cliSenha" placeholder="Senha" />
                    <button id="loginClienteBtn">Entrar</button>
                    <div class="toggle-auth" id="showRegCliente">Cadastrar cliente</div>
                </div>
                <div id="loginFormMoto" class="hidden">
                    <input type="text" id="motoNome" placeholder="Nome (Alex Moto)" />
                    <input type="password" id="motoSenha" placeholder="Senha (123)" />
                    <button id="loginMotoBtn">Entrar</button>
                    <div class="toggle-auth" id="showRegMoto">Cadastrar motoqueiro</div>
                </div>
                <div id="regCliente" class="hidden">
                    <input type="text" id="regNome" placeholder="Nome" />
                    <input type="text" id="regTelefone" placeholder="Telefone" />
                    <input type="text" id="regEndereco" placeholder="Endereço" />
                    <input type="password" id="regSenha" placeholder="Senha" />
                    <button id="cadastrarClienteBtn">Cadastrar</button>
                    <div class="toggle-auth" id="backToLoginCliente">Voltar</div>
                </div>
                <div id="regMoto" class="hidden">
                    <input type="text" id="motoRegNome" placeholder="Nome" />
                    <input type="password" id="motoRegSenha" placeholder="Senha" />
                    <button id="cadastrarMotoBtn">Cadastrar</button>
                    <div class="toggle-auth" id="backToLoginMoto">Voltar</div>
                </div>
            </div>
        `;
        function showLogin(tipo) {
            document.getElementById("loginFormCliente").classList.toggle("hidden", tipo !== "cliente");
            document.getElementById("loginFormMoto").classList.toggle("hidden", tipo !== "moto");
            document.getElementById("regCliente").classList.add("hidden");
            document.getElementById("regMoto").classList.add("hidden");
        }
        function showRegister(tipo) {
            if(tipo === "cliente") {
                document.getElementById("loginFormCliente").classList.add("hidden");
                document.getElementById("regCliente").classList.remove("hidden");
            } else {
                document.getElementById("loginFormMoto").classList.add("hidden");
                document.getElementById("regMoto").classList.remove("hidden");
            }
        }
        document.getElementById("btnClienteLogin").onclick = () => showLogin("cliente");
        document.getElementById("btnMotoLogin").onclick = () => showLogin("moto");
        document.getElementById("loginClienteBtn").onclick = () => {
            const tel = document.getElementById("cliTelefone").value.trim();
            const senha = document.getElementById("cliSenha").value;
            const client = clientsDB.find(c => c.telefone === tel && c.senha === senha);
            if(client) { currentUser = { type: "client", data: client }; renderDashboardCliente(client); }
            else alert("Cliente não encontrado. Demo: 11999999999 / 123");
        };
        document.getElementById("loginMotoBtn").onclick = () => {
            const nome = document.getElementById("motoNome").value.trim();
            const senha = document.getElementById("motoSenha").value;
            if(motoqueiroDB && motoqueiroDB.nome === nome && motoqueiroDB.senha === senha) {
                currentUser = { type: "moto", data: motoqueiroDB };
                renderDashboardMoto(motoqueiroDB);
            } else alert("Motoqueiro não encontrado. Demo: Alex Moto / 123");
        };
        document.getElementById("showRegCliente").onclick = () => showRegister("cliente");
        document.getElementById("showRegMoto").onclick = () => showRegister("moto");
        document.getElementById("cadastrarClienteBtn").onclick = () => {
            const nome = document.getElementById("regNome").value.trim();
            const tel = document.getElementById("regTelefone").value.trim();
            const end = document.getElementById("regEndereco").value.trim();
            const senha = document.getElementById("regSenha").value;
            if(!nome || !tel || !end || !senha) return alert("Preencha todos");
            if(clientsDB.find(c => c.telefone === tel)) return alert("Telefone já existe");
            const novo = { id: Date.now().toString(), nome, telefone: tel, endereco: end, senha, ultimaPassagem: "Nenhuma", chatMsgs: [{ from: "moto", text: "Bem-vindo!" }], muralPosts: [], historicoRondas: [] };
            clientsDB.push(novo);
            saveDB();
            alert("Cadastrado! Faça login.");
            showLogin("cliente");
        };
        document.getElementById("cadastrarMotoBtn").onclick = () => {
            const nome = document.getElementById("motoRegNome").value.trim();
            const senha = document.getElementById("motoRegSenha").value;
            if(!nome || !senha) return;
            motoqueiroDB = { id: "m1", nome, senha, localizacao: { lat: -23.5505, lng: -46.6333, timestamp: Date.now() }, historicoRondasFeitas: [], alertas: [], rastreamentoAtivo: false };
            saveDB();
            alert("Motoqueiro cadastrado! Faça login.");
            showLogin("moto");
        };
        document.getElementById("backToLoginCliente").onclick = () => showLogin("cliente");
        document.getElementById("backToLoginMoto").onclick = () => showLogin("moto");
    }

    // DASHBOARD CLIENTE (com mapa e polling)
    function renderDashboardCliente(client) {
        if(clientUpdateInterval) clearInterval(clientUpdateInterval);
        const root = document.getElementById("appRoot");
        const horas = ["22h","23h","00h","01h","02h","03h","04h","05h"];
        const rondasFeitas = client.historicoRondas || [];
        root.innerHTML = `
            <div class="app-container">
                <div class="header"><div class="logo"><h1><i class="fas fa-motorcycle"></i> Ronda Noturna</h1></div><div class="user-info"><i class="fas fa-user"></i> ${client.nome} <span style="font-size:12px;">📍 ${client.endereco}</span><button class="logout-btn" id="logoutBtn">Sair</button></div></div>
                <div class="dashboard">
                    <div class="card"><h3><i class="fas fa-map-marked-alt"></i> Localização do Motoqueiro (Tempo Real)</h3><div id="clienteMapContainer" class="map-container"></div><div class="last-pass" id="ultimaAtualizacaoGPS">Aguardando posição do motoqueiro...</div><button class="panico-btn" id="panicoBtn"><i class="fas fa-exclamation-triangle"></i> PÂNICO</button></div>
                    <div class="card"><h3><i class="fas fa-clock"></i> Rondas da noite</h3><div class="timeline">${horas.map(h => `<div class="timeline-item ${rondasFeitas.some(r => r.includes(h)) ? 'checked' : ''}">${h} ${rondasFeitas.some(r => r.includes(h)) ? '✅' : '⏳'}</div>`).join('')}</div></div>
                    <div class="card"><h3><i class="fas fa-comment"></i> Chat</h3><div class="chat-messages" id="chatMsgsArea">${client.chatMsgs.map(m => `<div class="msg ${m.from === 'client' ? 'msg-user' : ''}"><strong>${m.from === 'client' ? 'Você' : 'Motoqueiro'}:</strong> ${m.text}</div>`).join('')}</div><div class="chat-input"><input type="text" id="chatInput"/><button id="sendChat">Enviar</button></div></div>
                    <div class="card card-full"><h3><i class="fas fa-users"></i> Mural</h3><div id="muralList">${(client.muralPosts || []).map(p => `<div class="mural-item"><strong>${p.autor}:</strong> ${p.texto} <span style="font-size:0.7rem;">- ${p.horario}</span></div>`).join('')}</div><div style="display:flex; gap:8px;"><input type="text" id="novoPost" placeholder="Alerta anônimo..." style="flex:1; background:#1e293b; border:none; padding:10px; border-radius:40px;"><button id="postMuralBtn">Postar</button></div></div>
                </div>
                <footer>Ronda de hora em hora • Localização do motoqueiro em tempo real</footer>
            </div>
        `;
        // Mapa cliente
        if(clientMap) clientMap.remove();
        clientMap = L.map("clienteMapContainer").setView([-23.5505, -46.6333], 13);
        L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png', { attribution: '&copy; OSM' }).addTo(clientMap);
        clientMarker = L.marker([-23.5505, -46.6333], { title: "Motoqueiro" }).addTo(clientMap).bindPopup("Última posição");
        function atualizarMapaCliente() {
            loadDB();
            const moto = motoqueiroDB;
            if(moto && moto.localizacao && moto.localizacao.lat) {
                const { lat, lng, timestamp } = moto.localizacao;
                clientMarker.setLatLng([lat, lng]);
                clientMap.setView([lat, lng], 14);
                const dataStr = timestamp ? new Date(timestamp).toLocaleTimeString() : "agora";
                document.getElementById("ultimaAtualizacaoGPS").innerHTML = `🛵 Última posição: ${lat.toFixed(5)}, ${lng.toFixed(5)} (atualizado ${dataStr})`;
            } else {
                document.getElementById("ultimaAtualizacaoGPS").innerHTML = "⏳ Nenhuma posição recebida. O motoqueiro precisa ativar o GPS.";
            }
        }
        clientUpdateInterval = setInterval(atualizarMapaCliente, 3000);
        atualizarMapaCliente();
        // Eventos
        document.getElementById("logoutBtn").onclick = () => { if(clientUpdateInterval) clearInterval(clientUpdateInterval); currentUser = null; renderAuthScreen(); };
        document.getElementById("panicoBtn").onclick = () => { alert("Pânico acionado! Motoqueiro avisado."); if(motoqueiroDB) { if(!motoqueiroDB.alertas) motoqueiroDB.alertas = []; motoqueiroDB.alertas.push({ cliente: client.nome, endereco: client.endereco, horario: new Date().toLocaleTimeString() }); saveDB(); } };
        document.getElementById("sendChat").onclick = () => { const texto = document.getElementById("chatInput").value.trim(); if(texto) { client.chatMsgs.push({ from: "client", text: texto }); saveDB(); renderDashboardCliente(client); } };
        document.getElementById("postMuralBtn").onclick = () => { const novo = document.getElementById("novoPost").value.trim(); if(novo) { if(!client.muralPosts) client.muralPosts = []; client.muralPosts.unshift({ autor: "Anônimo", texto: novo, horario: new Date().toLocaleTimeString() }); saveDB(); renderDashboardCliente(client); } };
    }

    // DASHBOARD MOTOQUEIRO (com diagnóstico e botão de teste)
    function renderDashboardMoto(moto) {
        if(clientUpdateInterval) clearInterval(clientUpdateInterval);
        const root = document.getElementById("appRoot");
        const ruas = [...new Set(clientsDB.map(c => c.endereco))];
        root.innerHTML = `
            <div class="app-container">
                <div class="header"><div class="logo"><h1><i class="fas fa-motorcycle"></i> Painel Motoqueiro</h1></div><div class="user-info"><i class="fas fa-user-astronaut"></i> ${moto.nome}<button class="logout-btn" id="logoutMotoBtn">Sair</button></div></div>
                <div class="dashboard">
                    <div class="card"><h3><i class="fas fa-location-dot"></i> Minha localização (GPS)</h3><div id="motoMapContainer" class="map-container"></div><div id="gpsStatus" class="status-gps erro">Iniciando GPS...</div><button id="testarGPSBtn" style="background:#3b82f6; border:none; padding:8px; border-radius:40px; margin-top:8px;">📡 Testar GPS agora</button><button id="pararRastreamentoBtn" style="background:#ef4444; border:none; padding:8px; border-radius:40px; margin-top:8px;">Parar rastreamento</button><button id="reiniciarRastreamentoBtn" style="background:#22c55e; border:none; padding:8px; border-radius:40px; margin-top:8px;">Reiniciar rastreamento</button></div>
                    <div class="card"><h3><i class="fas fa-road"></i> Registrar passagem (ronda fixa)</h3><div id="listaRuas">${ruas.map(rua => `<div class="rua-item"><span>📍 ${rua}</span><button class="btn-passagem" data-rua="${rua}">✅ Passei agora</button></div>`).join('')}</div></div>
                    <div class="card"><h3><i class="fas fa-bell"></i> Alertas de pânico</h3><div id="alertasPanico">${moto.alertas?.length ? moto.alertas.map(a => `<div class="mural-item" style="border-left-color:red;">🚨 ${a.cliente} - ${a.endereco} às ${a.horario} <button class="responderAlerta" data-end="${a.endereco}">Atender</button></div>`).join('') : "<p>Nenhum alerta</p>"}</div></div>
                    <div class="card card-full"><h3><i class="fas fa-history"></i> Histórico de rondas</h3><div id="historicoMoto">${moto.historicoRondasFeitas?.map(h => `<div>✅ ${h}</div>`).join('') || "Nenhuma ronda registrada"}</div></div>
                </div>
                <footer>O GPS será ativado automaticamente. Se não funcionar, clique em "Testar GPS agora".</footer>
            </div>
        `;
        // Mapa motoqueiro
        if(motoMap) motoMap.remove();
        const { lat, lng } = moto.localizacao;
        motoMap = L.map("motoMapContainer").setView([lat, lng], 15);
        L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png').addTo(motoMap);
        motoMarker = L.marker([lat, lng]).addTo(motoMap).bindPopup("Sua posição");
        // Iniciar rastreamento automaticamente
        if (!moto.rastreamentoAtivo && watchId === null) {
            iniciarRastreamentoMoto();
        } else if (watchId !== null) {
            atualizarStatusGPSMoto("✅ Rastreamento ativo", true);
        }
        // Botão teste GPS (one-shot)
        document.getElementById("testarGPSBtn").onclick = () => {
            if (!navigator.geolocation) { alert("Geolocalização não suportada."); return; }
            navigator.geolocation.getCurrentPosition(
                (pos) => {
                    const { latitude, longitude } = pos.coords;
                    alert(`Posição obtida com sucesso!\nLat: ${latitude.toFixed(5)}\nLng: ${longitude.toFixed(5)}`);
                    motoqueiroDB.localizacao = { lat: latitude, lng: longitude, timestamp: Date.now() };
                    saveDB();
                    if(motoMap) atualizarMapaMoto(latitude, longitude);
                    atualizarStatusGPSMoto("✅ Teste manual bem-sucedido. Rastreamento contínuo será ativado.", true);
                    if(watchId === null) iniciarRastreamentoMoto();
                },
                (err) => {
                    alert(`Erro ao obter posição: ${err.message}`);
                },
                { enableHighAccuracy: true, timeout: 10000 }
            );
        };
        document.getElementById("pararRastreamentoBtn").onclick = () => { pararRastreamentoMoto(); };
        document.getElementById("reiniciarRastreamentoBtn").onclick = () => { pararRastreamentoMoto(); iniciarRastreamentoMoto(); };
        document.getElementById("logoutMotoBtn").onclick = () => { pararRastreamentoMoto(); currentUser = null; renderAuthScreen(); };
        // Registrar passagem
        document.querySelectorAll(".btn-passagem").forEach(btn => {
            btn.onclick = () => {
                const rua = btn.getAttribute("data-rua");
                const agora = new Date().toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'});
                moto.historicoRondasFeitas.unshift(`${rua} às ${agora}`);
                clientsDB.forEach(c => { if(c.endereco === rua) { c.ultimaPassagem = `${agora} (agora)`; c.historicoRondas = c.historicoRondas || []; c.historicoRondas.unshift(`${agora} ✅`); } });
                saveDB();
                renderDashboardMoto(moto);
            };
        });
        document.querySelectorAll(".responderAlerta").forEach(btn => {
            btn.onclick = () => {
                const end = btn.getAttribute("data-end");
                alert(`Respondendo alerta de ${end}`);
                moto.alertas = moto.alertas.filter(a => a.endereco !== end);
                saveDB();
                renderDashboardMoto(moto);
            };
        });
    }

    loadDB();
    renderAuthScreen();
</script>
</body>
</html>
