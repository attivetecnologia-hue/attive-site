<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Ronda Noturna - Rastreamento Inteligente</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Inter', sans-serif; background: #0a0f1e; color: #eef2ff; padding: 12px; }
        .app-container { max-width: 100%; margin: 0 auto; background: #0f172a; border-radius: 24px; overflow: hidden; border: 1px solid #1e293b; }
        .header { background: #020617; padding: 0.8rem 1.2rem; display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 12px; }
        .logo h1 { font-size: 1.3rem; font-weight: 700; background: linear-gradient(135deg, #facc15, #ff8c00); -webkit-background-clip: text; background-clip: text; color: transparent; }
        .user-info { display: flex; align-items: center; gap: 12px; background: #1e293b; padding: 6px 16px; border-radius: 40px; font-size: 0.85rem; flex-wrap: wrap; }
        .logout-btn { background: none; border: 1px solid #ef4444; color: #fecaca; padding: 4px 12px; border-radius: 40px; cursor: pointer; }
        .editar-btn { background: none; border: 1px solid #facc15; color: #facc15; padding: 4px 12px; border-radius: 40px; cursor: pointer; font-size: 0.7rem; margin-left: 8px; }
        .dashboard { padding: 1rem; display: flex; flex-direction: column; gap: 1rem; }
        .card { background: #111827; border-radius: 20px; padding: 1rem; border: 1px solid #1f2a44; }
        .card h3 { font-size: 1.1rem; margin-bottom: 0.8rem; border-left: 3px solid #facc15; padding-left: 10px; display: flex; align-items: center; gap: 8px; }
        .map-container { height: 280px; border-radius: 16px; overflow: hidden; background: #1e293b; }
        .panico-btn { background: #dc2626; width: 100%; padding: 12px; border: none; border-radius: 60px; font-weight: bold; color: white; cursor: pointer; margin-top: 12px; font-size: 1rem; }
        .status-gps, .info-hora { font-size: 0.8rem; margin-top: 8px; padding: 6px; border-radius: 16px; background: #1e293b; text-align: center; }
        .info-hora { background: #0f172a; color: #86efac; }
        .auth-screen { max-width: 400px; margin: 30px auto; background: #111827; border-radius: 28px; padding: 1.5rem; }
        .auth-screen input { width: 100%; padding: 12px; margin: 8px 0; background: #1e293b; border: 1px solid #334155; border-radius: 20px; color: white; }
        .auth-screen button { width: 100%; background: #facc15; border: none; padding: 12px; border-radius: 40px; font-weight: bold; margin-top: 15px; cursor: pointer; color: #0f172a; }
        .toggle-auth { text-align: center; margin-top: 15px; color: #94a3b8; cursor: pointer; font-size: 0.85rem; }
        .reset-btn { background: #ef4444; margin-top: 10px; }
        .hidden { display: none; }
        .moto-marker i { font-size: 28px; color: #0047AB; text-shadow: 1px 1px 0 #000; }
        .casa-marker i { font-size: 24px; color: #facc15; text-shadow: 1px 1px 0 #000; }
        .ultima-passagem { font-size: 0.8rem; margin-top: 8px; padding: 6px; background: #1e293b; border-radius: 16px; text-align: center; }
        footer { text-align: center; padding: 1rem; font-size: 0.7rem; color: #475569; border-top: 1px solid #1e293b; }
        @media (min-width: 768px) {
            .dashboard { display: grid; grid-template-columns: repeat(2, 1fr); gap: 1.5rem; }
        }
    </style>
</head>
<body>
<div id="appRoot"></div>

<script>
    // ========== CONFIGURAÇÃO DO SUPABASE (CREDENCIAIS INSERIDAS) ==========
    const SUPABASE_URL = "https://xjjyaxccbylpiwpfoxaq.supabase.co";
    const SUPABASE_ANON_KEY = "sb_publishable_y9sDx5DqyjjXzV7CAxEpGQ_23W18H_t";
    const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    // ========== DADOS LOCAIS (apenas estado) ==========
    let currentUser = null;          // { id, email, nome, papel, endereco, latCasa, lngCasa }
    let watchId = null;
    let ultimoEnvio = { timestamp: 0, lat: 0, lng: 0, bearing: 0 };
    let ultimoEnvioPorAngulo = 0;
    let clientMap = null, clientMarker = null, casaMarker = null;
    let motoMap = null, motoMarker = null;
    let clientUpdateInterval = null;
    let posicaoSubscription = null;

    // Cache para geocodificação reversa (endereço a partir de lat/lng)
    let reverseCache = {};

    // ========== FUNÇÕES AUXILIARES ==========
    function calcularDistancia(lat1, lon1, lat2, lon2) {
        const R = 6371000;
        const dLat = (lat2 - lat1) * Math.PI / 180;
        const dLon = (lon2 - lon1) * Math.PI / 180;
        const a = Math.sin(dLat/2)**2 + Math.cos(lat1 * Math.PI/180) * Math.cos(lat2 * Math.PI/180) * Math.sin(dLon/2)**2;
        return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
    }

    function calcularBearing(lat1, lng1, lat2, lng2) {
        const toRad = d => d * Math.PI/180;
        const toDeg = r => r * 180/Math.PI;
        const dLng = toRad(lng2 - lng1);
        const y = Math.sin(dLng) * Math.cos(toRad(lat2));
        const x = Math.cos(toRad(lat1))*Math.sin(toRad(lat2)) - Math.sin(toRad(lat1))*Math.cos(toRad(lat2))*Math.cos(dLng);
        let bearing = toDeg(Math.atan2(y, x));
        return (bearing + 360) % 360;
    }

    async function obterEnderecoAproximado(lat, lng) {
        const chave = `${lat.toFixed(5)},${lng.toFixed(5)}`;
        if (reverseCache[chave]) return reverseCache[chave];
        try {
            const url = `https://nominatim.openstreetmap.org/reverse?format=json&lat=${lat}&lon=${lng}&zoom=18&addressdetails=1`;
            const resp = await fetch(url);
            const data = await resp.json();
            let endereco = "Endereço não identificado";
            if (data.address) {
                const rua = data.address.road || data.address.street || data.address.suburb || "";
                const numero = data.address.house_number || "";
                endereco = rua && numero ? `${rua}, ${numero}` : (rua || data.address.city || "Localização aproximada");
            }
            reverseCache[chave] = endereco;
            if (Object.keys(reverseCache).length > 200) delete reverseCache[Object.keys(reverseCache)[0]];
            return endereco;
        } catch(e) { return "Rua não identificada"; }
    }

    function criarIconeMoto() {
        return L.divIcon({ html: '<i class="fas fa-motorcycle"></i>', iconSize: [30,30], className: 'moto-marker', popupAnchor: [0,-10] });
    }
    function criarIconeCasa() {
        return L.divIcon({ html: '<i class="fas fa-home"></i>', iconSize: [24,24], className: 'casa-marker', popupAnchor: [0,-10] });
    }

    // ========== RASTREAMENTO INTELIGENTE (motoqueiro) ==========
    async function enviarPosicao(lat, lng, precisao, timestamp) {
        if (!currentUser || currentUser.papel !== 'motoqueiro') return;
        const dataHoraStr = new Date(timestamp).toLocaleString('pt-BR');
        // Inserir na tabela posicoes
        const { error } = await supabase.from('posicoes').insert({
            motoqueiro_id: currentUser.id,
            latitude: lat,
            longitude: lng,
            precisao: precisao,
            timestamp: new Date(timestamp).toISOString()
        });
        if (error) console.error("Erro ao inserir posição:", error);
        else console.log("Posição enviada:", dataHoraStr);

        // Detectar passagem automática (distância <= 50m de cada cliente)
        const { data: clientes, error: clientesError } = await supabase
            .from('usuarios')
            .select('id, endereco, ultima_passagem')
            .eq('papel', 'cliente');
        if (!clientesError && clientes) {
            for (let cliente of clientes) {
                if (!cliente.endereco) continue;
                // Geocodificar endereço do cliente (uma vez, mas aqui simplificamos)
                let coords = await geocodificarEndereco(cliente.endereco);
                if (coords) {
                    const dist = calcularDistancia(lat, lng, coords.lat, coords.lng);
                    if (dist <= 50) {
                        const ultima = cliente.ultima_passagem ? new Date(cliente.ultima_passagem).getTime() : 0;
                        if (timestamp - ultima > 60000) {
                            // Atualizar ultima_passagem do cliente
                            await supabase.from('usuarios').update({ ultima_passagem: new Date(timestamp).toISOString() }).eq('id', cliente.id);
                            // Inserir na tabela rondas
                            await supabase.from('rondas').insert({
                                cliente_id: cliente.id,
                                motoqueiro_id: currentUser.id,
                                timestamp: new Date(timestamp).toISOString(),
                                distancia_metros: Math.round(dist)
                            });
                            console.log(`Passagem registrada para cliente ${cliente.id} - ${dataHoraStr}`);
                        }
                    }
                }
            }
        }
    }

    async function geocodificarEndereco(endereco) {
        // Usa Nominatim com cache simples
        const cacheKey = `geo_${endereco}`;
        if (window.geoCache && window.geoCache[cacheKey]) return window.geoCache[cacheKey];
        try {
            const url = `https://nominatim.openstreetmap.org/search?format=json&q=${encodeURIComponent(endereco)}&limit=1`;
            const resp = await fetch(url);
            const data = await resp.json();
            if (data && data[0]) {
                const coords = { lat: parseFloat(data[0].lat), lng: parseFloat(data[0].lon) };
                if (!window.geoCache) window.geoCache = {};
                window.geoCache[cacheKey] = coords;
                return coords;
            }
        } catch(e) { console.error("Geocodificação falhou", e); }
        return null;
    }

    function iniciarRastreamentoMoto() {
        if (!navigator.geolocation) return;
        if (watchId !== null) return;
        const verificarEnvio = (position) => {
            const { latitude, longitude, accuracy } = position.coords;
            const agora = Date.now();
            const tempoDecorrido = agora - ultimoEnvio.timestamp;
            let variacaoAngulo = 0;
            if (ultimoEnvio.timestamp > 0) {
                const bearingAtual = calcularBearing(ultimoEnvio.lat, ultimoEnvio.lng, latitude, longitude);
                let diff = Math.abs(bearingAtual - ultimoEnvio.bearing);
                variacaoAngulo = Math.min(diff, 360 - diff);
            }
            let deveEnviar = false;
            if (ultimoEnvio.timestamp === 0) deveEnviar = true;
            else if (tempoDecorrido >= 60000) deveEnviar = true;
            else if (variacaoAngulo >= 10 && (agora - ultimoEnvioPorAngulo) >= 10000) deveEnviar = true;
            if (deveEnviar) {
                enviarPosicao(latitude, longitude, accuracy, agora);
                ultimoEnvio = {
                    timestamp: agora,
                    lat: latitude,
                    lng: longitude,
                    bearing: variacaoAngulo === 0 ? 0 : calcularBearing(ultimoEnvio.lat, ultimoEnvio.lng, latitude, longitude)
                };
                if (variacaoAngulo >= 10) ultimoEnvioPorAngulo = agora;
                if (motoMap) atualizarMapaMoto(latitude, longitude);
            }
        };
        watchId = navigator.geolocation.watchPosition(verificarEnvio, (err) => console.error(err), { enableHighAccuracy: true, timeout: 15000 });
    }

    function pararRastreamentoMoto() {
        if (watchId) { navigator.geolocation.clearWatch(watchId); watchId = null; }
    }
    function atualizarMapaMoto(lat, lng) {
        if (!motoMap) return;
        if (!motoMarker) motoMarker = L.marker([lat,lng], { icon: criarIconeMoto() }).addTo(motoMap).bindPopup("Sua posição").openPopup();
        else motoMarker.setLatLng([lat,lng]);
        motoMap.setView([lat,lng], 15);
        // Atualizar popup com endereço
        obterEnderecoAproximado(lat, lng).then(end => {
            motoMarker.bindPopup(`<b>Sua posição</b><br>${end}`).openPopup();
        });
    }

    // ========== RECEBER POSIÇÃO EM TEMPO REAL (CLIENTE) ==========
    function assinarPosicaoMoto() {
        if (posicaoSubscription) posicaoSubscription.unsubscribe();
        posicaoSubscription = supabase
            .channel('posicoes')
            .on('postgres_changes', { event: 'INSERT', schema: 'public', table: 'posicoes' }, (payload) => {
                const novaPos = payload.new;
                if (clientMarker && clientMap) {
                    clientMarker.setLatLng([novaPos.latitude, novaPos.longitude]);
                    clientMap.setView([novaPos.latitude, novaPos.longitude], 14);
                    const dataHora = new Date(novaPos.timestamp).toLocaleString('pt-BR');
                    document.getElementById("ultimaPosicaoHora").innerHTML = `<i class="fas fa-sync-alt"></i> Última atualização: ${dataHora}`;
                    obterEnderecoAproximado(novaPos.latitude, novaPos.longitude).then(end => {
                        clientMarker.bindPopup(`<b>Motoqueiro</b><br>${end}`).openPopup();
                    });
                }
            })
            .subscribe();
    }

    // ========== TELAS ==========
    async function fazerLogin(email, senha) {
        const { data, error } = await supabase.auth.signInWithPassword({ email, password: senha });
        if (error) { alert("Erro: " + error.message); return false; }
        // Buscar dados adicionais na tabela usuarios
        const { data: userData, error: userError } = await supabase
            .from('usuarios')
            .select('*')
            .eq('email', email)
            .single();
        if (userError) { alert("Usuário não encontrado na tabela. Contate o administrador."); return false; }
        currentUser = {
            id: userData.id,
            email: userData.email,
            nome: userData.nome,
            papel: userData.papel,
            endereco: userData.endereco,
            latCasa: null, lngCasa: null
        };
        if (currentUser.endereco) {
            const coords = await geocodificarEndereco(currentUser.endereco);
            if (coords) { currentUser.latCasa = coords.lat; currentUser.lngCasa = coords.lng; }
        }
        return true;
    }

    async function fazerCadastroCliente(email, senha, nome, endereco, telefone) {
        // Criar usuário no auth
        const { data, error } = await supabase.auth.signUp({ email, password: senha });
        if (error) { alert(error.message); return false; }
        // Inserir na tabela usuarios
        const { error: insertError } = await supabase.from('usuarios').insert({
            id: data.user.id,
            email: email,
            nome: nome,
            papel: 'cliente',
            endereco: endereco,
            telefone: telefone
        });
        if (insertError) { alert("Erro ao cadastrar: " + insertError.message); return false; }
        return true;
    }

    function renderAuthScreen() {
        const root = document.getElementById("appRoot");
        root.innerHTML = `
            <div class="auth-screen">
                <h2 style="text-align:center">Ronda Noturna</h2>
                <div id="loginForm">
                    <input type="email" id="loginEmail" placeholder="E-mail" />
                    <input type="password" id="loginSenha" placeholder="Senha" />
                    <button id="loginBtn">Entrar</button>
                    <div class="toggle-auth" id="showReg">Cadastrar-se como cliente</div>
                </div>
                <div id="regForm" class="hidden">
                    <input type="text" id="regNome" placeholder="Nome completo" />
                    <input type="email" id="regEmail" placeholder="E-mail" />
                    <input type="password" id="regSenha" placeholder="Senha" />
                    <input type="text" id="regEndereco" placeholder="Endereço completo" />
                    <input type="text" id="regTelefone" placeholder="Telefone" />
                    <button id="regBtn">Cadastrar</button>
                    <div class="toggle-auth" id="backToLogin">← Voltar ao login</div>
                </div>
            </div>
        `;
        document.getElementById("loginBtn").onclick = async () => {
            const email = document.getElementById("loginEmail").value.trim();
            const senha = document.getElementById("loginSenha").value;
            if (await fazerLogin(email, senha)) {
                if (currentUser.papel === 'cliente') renderDashboardCliente();
                else if (currentUser.papel === 'motoqueiro') renderDashboardMoto();
                else if (currentUser.papel === 'admin') alert("Painel admin em breve");
            }
        };
        document.getElementById("showReg").onclick = () => {
            document.getElementById("loginForm").classList.add("hidden");
            document.getElementById("regForm").classList.remove("hidden");
        };
        document.getElementById("backToLogin").onclick = () => {
            document.getElementById("regForm").classList.add("hidden");
            document.getElementById("loginForm").classList.remove("hidden");
        };
        document.getElementById("regBtn").onclick = async () => {
            const nome = document.getElementById("regNome").value.trim();
            const email = document.getElementById("regEmail").value.trim();
            const senha = document.getElementById("regSenha").value;
            const endereco = document.getElementById("regEndereco").value.trim();
            const telefone = document.getElementById("regTelefone").value.trim();
            if (!nome || !email || !senha || !endereco) { alert("Preencha todos os campos"); return; }
            if (await fazerCadastroCliente(email, senha, nome, endereco, telefone)) {
                alert("Cadastro realizado! Faça login.");
                document.getElementById("regForm").classList.add("hidden");
                document.getElementById("loginForm").classList.remove("hidden");
            }
        };
    }

    async function renderDashboardCliente() {
        if (clientUpdateInterval) clearInterval(clientUpdateInterval);
        const root = document.getElementById("appRoot");
        root.innerHTML = `
            <div class="app-container">
                <div class="header">
                    <div class="logo"><h1><i class="fas fa-motorcycle"></i> Ronda Noturna</h1></div>
                    <div class="user-info">
                        <i class="fas fa-user"></i> ${currentUser.nome}
                        <button class="editar-btn" id="editarEnderecoBtn"><i class="fas fa-edit"></i> Editar endereço</button>
                        <button class="logout-btn" id="logoutBtn">Sair</button>
                    </div>
                </div>
                <div class="dashboard">
                    <div class="card">
                        <h3><i class="fas fa-map-marked-alt"></i> Localização do Motoqueiro</h3>
                        <div id="mapContainer" class="map-container"></div>
                        <div class="info-hora" id="ultimaPosicaoHora">Última atualização: aguardando...</div>
                        <div class="ultima-passagem" id="ultimaPassagem">Última passagem: aguardando...</div>
                        <button class="panico-btn" id="panicoBtn"><i class="fas fa-bell"></i> Pânico - Acionar Motoqueiro</button>
                    </div>
                </div>
                <footer>Posição atualizada em tempo real. Ícone da casa mostra seu endereço.</footer>
            </div>
        `;
        if (clientMap) clientMap.remove();
        clientMap = L.map("mapContainer").setView([-23.5505, -46.6333], 13);
        L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png', { attribution: '&copy; OSM' }).addTo(clientMap);
        clientMarker = L.marker([-23.5505, -46.6333], { icon: criarIconeMoto() }).addTo(clientMap).bindPopup("Motoqueiro");

        function atualizarMarcadorCasa() {
            if (casaMarker) casaMarker.remove();
            if (currentUser.latCasa && currentUser.lngCasa) {
                casaMarker = L.marker([currentUser.latCasa, currentUser.lngCasa], { icon: criarIconeCasa() }).addTo(clientMap)
                    .bindPopup(`<b>Sua casa</b><br>${currentUser.endereco}`).openPopup();
                clientMap.fitBounds(L.latLngBounds([[currentUser.latCasa, currentUser.lngCasa]]));
            }
        }
        atualizarMarcadorCasa();

        // Buscar última passagem do cliente
        const { data: rondaData, error: rondaError } = await supabase
            .from('rondas')
            .select('timestamp')
            .eq('cliente_id', currentUser.id)
            .order('timestamp', { ascending: false })
            .limit(1);
        if (!rondaError && rondaData && rondaData[0]) {
            const ultima = new Date(rondaData[0].timestamp).toLocaleString('pt-BR');
            document.getElementById("ultimaPassagem").innerHTML = `<i class="fas fa-clock"></i> Última passagem: ${ultima}`;
        } else {
            document.getElementById("ultimaPassagem").innerHTML = `<i class="fas fa-clock"></i> Última passagem: Nenhuma ainda`;
        }

        // Assinar novas posições
        assinarPosicaoMoto();

        document.getElementById("editarEnderecoBtn").onclick = async () => {
            const novoEnd = prompt("Digite seu novo endereço completo:", currentUser.endereco);
            if (novoEnd && novoEnd.trim()) {
                const coords = await geocodificarEndereco(novoEnd);
                if (!coords) { alert("Endereço não encontrado."); return; }
                currentUser.endereco = novoEnd;
                currentUser.latCasa = coords.lat;
                currentUser.lngCasa = coords.lng;
                await supabase.from('usuarios').update({ endereco: novoEnd }).eq('id', currentUser.id);
                atualizarMarcadorCasa();
                alert("Endereço atualizado!");
            }
        };
        document.getElementById("logoutBtn").onclick = () => {
            if (posicaoSubscription) posicaoSubscription.unsubscribe();
            supabase.auth.signOut();
            currentUser = null;
            renderAuthScreen();
        };
        document.getElementById("panicoBtn").onclick = async () => {
            alert("Pânico acionado! O motoqueiro foi notificado.");
            // Aqui você pode inserir uma notificação na tabela "alertas" (opcional)
        };
    }

    async function renderDashboardMoto() {
        if (clientUpdateInterval) clearInterval(clientUpdateInterval);
        const root = document.getElementById("appRoot");
        root.innerHTML = `
            <div class="app-container">
                <div class="header">
                    <div class="logo"><h1><i class="fas fa-motorcycle"></i> Painel Motoqueiro</h1></div>
                    <div class="user-info"><i class="fas fa-user-astronaut"></i> ${currentUser.nome}<button class="logout-btn" id="logoutMotoBtn">Sair</button></div>
                </div>
                <div class="dashboard">
                    <div class="card">
                        <h3><i class="fas fa-satellite-dish"></i> Minha Localização (envio a cada 60s ou >10°)</h3>
                        <div id="motoMapContainer" class="map-container"></div>
                        <div id="gpsStatus" class="status-gps">Inicializando...</div>
                        <div id="horaUltimaPosicao" class="info-hora"></div>
                        <button id="pararRastreamentoBtn" style="background:#ef4444; width:100%; padding:8px; border:none; border-radius:40px; margin-top:8px;">Desativar GPS</button>
                        <button id="reiniciarRastreamentoBtn" style="background:#22c55e; width:100%; padding:8px; border:none; border-radius:40px; margin-top:8px;">Ativar GPS</button>
                    </div>
                    <div class="card">
                        <h3><i class="fas fa-bell"></i> Alertas de pânico (em breve)</h3>
                        <div id="alertasPanico"><p>Nenhum alerta</p></div>
                    </div>
                    <div class="card">
                        <h3><i class="fas fa-history"></i> Histórico de rondas realizadas (automático)</h3>
                        <div id="historicoMoto" style="max-height:200px; overflow-y:auto;">Carregando...</div>
                    </div>
                </div>
                <footer>GPS envia posição a cada 60s ou quando muda direção >10°.</footer>
            </div>
        `;
        if (motoMap) motoMap.remove();
        motoMap = L.map("motoMapContainer").setView([-23.5505, -46.6333], 15);
        L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png').addTo(motoMap);
        motoMarker = L.marker([-23.5505, -46.6333], { icon: criarIconeMoto() }).addTo(motoMap).bindPopup("Sua posição");
        // Carregar histórico de rondas
        const { data: rondas, error } = await supabase
            .from('rondas')
            .select('*, usuarios!rondas_cliente_id_fkey(nome, endereco)')
            .eq('motoqueiro_id', currentUser.id)
            .order('timestamp', { ascending: false });
        if (!error && rondas) {
            document.getElementById("historicoMoto").innerHTML = rondas.map(r => `<div><i class="fas fa-check-circle"></i> ${new Date(r.timestamp).toLocaleString('pt-BR')} - ${r.usuarios?.endereco || 'Cliente'}</div>`).join('') || "Nenhuma ronda registrada";
        } else {
            document.getElementById("historicoMoto").innerHTML = "Nenhuma ronda registrada";
        }

        document.getElementById("pararRastreamentoBtn").onclick = () => pararRastreamentoMoto();
        document.getElementById("reiniciarRastreamentoBtn").onclick = () => { pararRastreamentoMoto(); iniciarRastreamentoMoto(); };
        document.getElementById("logoutMotoBtn").onclick = () => { pararRastreamentoMoto(); supabase.auth.signOut(); currentUser = null; renderAuthScreen(); };
        iniciarRastreamentoMoto();
    }

    // Verificar se já existe sessão ativa
    async function checkSession() {
        const { data: { session }, error } = await supabase.auth.getSession();
        if (session) {
            const { data: userData, error: userError } = await supabase
                .from('usuarios')
                .select('*')
                .eq('email', session.user.email)
                .single();
            if (userData) {
                currentUser = {
                    id: userData.id,
                    email: userData.email,
                    nome: userData.nome,
                    papel: userData.papel,
                    endereco: userData.endereco,
                    latCasa: null, lngCasa: null
                };
                if (currentUser.endereco) {
                    const coords = await geocodificarEndereco(currentUser.endereco);
                    if (coords) { currentUser.latCasa = coords.lat; currentUser.lngCasa = coords.lng; }
                }
                if (currentUser.papel === 'cliente') renderDashboardCliente();
                else if (currentUser.papel === 'motoqueiro') renderDashboardMoto();
                else renderAuthScreen();
                return;
            }
        }
        renderAuthScreen();
    }

    checkSession();
</script>
</body>
</html>
