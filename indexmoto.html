<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Ronda Noturna - Rastreamento Inteligente</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Inter', sans-serif; background: #0a0f1e; color: #eef2ff; padding: 12px; }
        .app-container { max-width: 100%; margin: 0 auto; background: #0f172a; border-radius: 24px; overflow: hidden; border: 1px solid #1e293b; }
        .header { background: #020617; padding: 0.8rem 1.2rem; display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 12px; }
        .logo h1 { font-size: 1.3rem; font-weight: 700; background: linear-gradient(135deg, #facc15, #ff8c00); -webkit-background-clip: text; background-clip: text; color: transparent; }
        .user-info { display: flex; align-items: center; gap: 12px; background: #1e293b; padding: 6px 16px; border-radius: 40px; font-size: 0.85rem; flex-wrap: wrap; }
        .logout-btn { background: none; border: 1px solid #ef4444; color: #fecaca; padding: 4px 12px; border-radius: 40px; cursor: pointer; }
        .editar-btn { background: none; border: 1px solid #facc15; color: #facc15; padding: 4px 12px; border-radius: 40px; cursor: pointer; font-size: 0.7rem; margin-left: 8px; }
        .dashboard { padding: 1rem; display: flex; flex-direction: column; gap: 1rem; }
        .card { background: #111827; border-radius: 20px; padding: 1rem; border: 1px solid #1f2a44; }
        .card h3 { font-size: 1.1rem; margin-bottom: 0.8rem; border-left: 3px solid #facc15; padding-left: 10px; display: flex; align-items: center; gap: 8px; }
        .map-container { height: 280px; border-radius: 16px; overflow: hidden; background: #1e293b; }
        .panico-btn { background: #dc2626; width: 100%; padding: 12px; border: none; border-radius: 60px; font-weight: bold; color: white; cursor: pointer; margin-top: 12px; font-size: 1rem; }
        .status-gps, .info-hora { font-size: 0.8rem; margin-top: 8px; padding: 6px; border-radius: 16px; background: #1e293b; text-align: center; }
        .info-hora { background: #0f172a; color: #86efac; }
        .auth-screen { max-width: 400px; margin: 30px auto; background: #111827; border-radius: 28px; padding: 1.5rem; }
        .auth-screen input { width: 100%; padding: 12px; margin: 8px 0; background: #1e293b; border: 1px solid #334155; border-radius: 20px; color: white; }
        .auth-screen button { width: 100%; background: #facc15; border: none; padding: 12px; border-radius: 40px; font-weight: bold; margin-top: 15px; cursor: pointer; color: #0f172a; }
        .toggle-auth { text-align: center; margin-top: 15px; color: #94a3b8; cursor: pointer; font-size: 0.85rem; }
        .hidden { display: none; }
        .moto-marker i { font-size: 28px; color: #0047AB; text-shadow: 1px 1px 0 #000; }
        .casa-marker i { font-size: 24px; color: #facc15; text-shadow: 1px 1px 0 #000; }
        .ultima-passagem { font-size: 0.8rem; margin-top: 8px; padding: 6px; background: #1e293b; border-radius: 16px; text-align: center; }
        footer { text-align: center; padding: 1rem; font-size: 0.7rem; color: #475569; border-top: 1px solid #1e293b; }
        @media (min-width: 768px) {
            .dashboard { display: grid; grid-template-columns: repeat(2, 1fr); gap: 1.5rem; }
        }
    </style>
</head>
<body>
<div id="appRoot"></div>

<script>
    // ========== CONFIGURAÇÃO DO FIREBASE ==========
    const firebaseConfig = {
        apiKey: "SUA_API_KEY",
        authDomain: "SEU_PROJETO.firebaseapp.com",
        databaseURL: "https://SEU_PROJETO-default-rtdb.firebaseio.com",
        projectId: "SEU_PROJETO",
        storageBucket: "SEU_PROJETO.appspot.com",
        messagingSenderId: "SEU_SENDER_ID",
        appId: "SEU_APP_ID"
    };
    firebase.initializeApp(firebaseConfig);
    const database = firebase.database();
    const posicaoRef = database.ref('ronda/posicaoMotoqueiro');

    // ========== DADOS LOCAIS ==========
    let clientsDB = [];
    let motoqueiroDB = null;
    let watchId = null;
    let currentUser = null;
    let clientUpdateInterval = null;
    let motoMap = null, motoMarker = null, clientMap = null, clientMarker = null, casaMarker = null;
    let clientCoordsCache = {}; // cache das coordenadas dos endereços dos clientes
    let ultimoEnvio = { timestamp: 0, lat: 0, lng: 0, bearing: 0 };
    let ultimoEnvioPorAngulo = 0;

    // ========== FUNÇÕES AUXILIARES ==========
    function calcularDistancia(lat1, lon1, lat2, lon2) {
        const R = 6371000; // metros
        const dLat = (lat2 - lat1) * Math.PI / 180;
        const dLon = (lon2 - lon1) * Math.PI / 180;
        const a = Math.sin(dLat/2) ** 2 +
                  Math.cos(lat1 * Math.PI/180) * Math.cos(lat2 * Math.PI/180) *
                  Math.sin(dLon/2) ** 2;
        return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
    }

    // Cálculo do bearing (ângulo entre dois pontos)
    function calcularBearing(lat1, lng1, lat2, lng2) {
        const toRad = (deg) => deg * Math.PI / 180;
        const toDeg = (rad) => rad * 180 / Math.PI;
        const dLng = toRad(lng2 - lng1);
        const y = Math.sin(dLng) * Math.cos(toRad(lat2));
        const x = Math.cos(toRad(lat1)) * Math.sin(toRad(lat2)) -
                  Math.sin(toRad(lat1)) * Math.cos(toRad(lat2)) * Math.cos(dLng);
        let bearing = toDeg(Math.atan2(y, x));
        return (bearing + 360) % 360;
    }

    // Geocodificação (endereço -> coordenadas)
    async function geocodificarEndereco(endereco) {
        try {
            const url = `https://nominatim.openstreetmap.org/search?format=json&q=${encodeURIComponent(endereco)}&limit=1`;
            const resp = await fetch(url);
            const data = await resp.json();
            if (data && data[0]) return { lat: parseFloat(data[0].lat), lng: parseFloat(data[0].lon) };
        } catch(e) { console.error("Erro geocodificação:", e); }
        return null;
    }

    // Reverse geocoding (coordenadas -> endereço aproximado) com cache
    let reverseCache = {};
    async function obterEnderecoAproximado(lat, lng) {
        const chave = `${lat.toFixed(5)},${lng.toFixed(5)}`;
        if (reverseCache[chave]) return reverseCache[chave];
        try {
            const url = `https://nominatim.openstreetmap.org/reverse?format=json&lat=${lat}&lon=${lng}&zoom=18&addressdetails=1`;
            const resp = await fetch(url);
            const data = await resp.json();
            let endereco = "Endereço não identificado";
            if (data.address) {
                const rua = data.address.road || data.address.street || data.address.suburb || "";
                const numero = data.address.house_number || "";
                endereco = rua && numero ? `${rua}, ${numero}` : (rua || data.address.city || "Localização aproximada");
            }
            reverseCache[chave] = endereco;
            if (Object.keys(reverseCache).length > 200) delete reverseCache[Object.keys(reverseCache)[0]];
            return endereco;
        } catch(e) { return "Rua não identificada"; }
    }

    // Carregar dados do localStorage e geocodificar endereços dos clientes
    async function loadDB() {
        const storedClients = localStorage.getItem("rondaClients");
        if(storedClients) {
            clientsDB = JSON.parse(storedClients);
        } else {
            clientsDB = [{
                id: "c1", nome: "Hélio Crispim", telefone: "11999999999",
                endereco: "R. Manoel Elías de Castro, 471 - Nações, Campina Grande - PB", senha: "123",
                ultimaPassagem: null, historicoPassagens: [], latCasa: null, lngCasa: null
            }];
            localStorage.setItem("rondaClients", JSON.stringify(clientsDB));
        }
        // Geocodificar endereços dos clientes e armazenar coordenadas da casa
        for (let client of clientsDB) {
            if (!clientCoordsCache[client.endereco]) {
                const coords = await geocodificarEndereco(client.endereco);
                if (coords) {
                    clientCoordsCache[client.endereco] = coords;
                    client.latCasa = coords.lat;
                    client.lngCasa = coords.lng;
                }
            } else {
                client.latCasa = clientCoordsCache[client.endereco].lat;
                client.lngCasa = clientCoordsCache[client.endereco].lng;
            }
        }
        saveDB(); // salva as coordenadas da casa no cliente

        const storedMoto = localStorage.getItem("rondaMotoqueiro");
        if(storedMoto) {
            motoqueiroDB = JSON.parse(storedMoto);
        } else {
            motoqueiroDB = {
                id: "m1", nome: "Alex Moto", senha: "123",
                localizacao: { lat: -23.5505, lng: -46.6333, timestamp: Date.now() },
                historicoRondasFeitas: [], alertas: []
            };
            localStorage.setItem("rondaMotoqueiro", JSON.stringify(motoqueiroDB));
        }
    }
    function saveDB() {
        localStorage.setItem("rondaClients", JSON.stringify(clientsDB));
        localStorage.setItem("rondaMotoqueiro", JSON.stringify(motoqueiroDB));
    }

    // Ícones
    function criarIconeMoto() {
        return L.divIcon({
            html: '<i class="fas fa-motorcycle"></i>',
            iconSize: [30,30],
            className: 'moto-marker',
            popupAnchor: [0,-10]
        });
    }
    function criarIconeCasa() {
        return L.divIcon({
            html: '<i class="fas fa-home"></i>',
            iconSize: [24,24],
            className: 'casa-marker',
            popupAnchor: [0,-10]
        });
    }

    // ========== RASTREAMENTO INTELIGENTE (60s + 10 graus) ==========
    function iniciarRastreamentoMoto() {
        if (!navigator.geolocation) {
            atualizarStatusGPS("Geolocalização não suportada.", false);
            return;
        }
        if (watchId !== null) return;
        atualizarStatusGPS("Iniciando GPS (modo inteligente: 60s ou 10°)...", false);
        
        // Função para enviar posição (se atender critérios)
        const verificarEnvio = (position) => {
            const { latitude, longitude, accuracy } = position.coords;
            const agora = Date.now();
            const tempoDecorrido = agora - ultimoEnvio.timestamp;
            
            // Calcular bearing entre última posição enviada e posição atual
            let variacaoAngulo = 0;
            if (ultimoEnvio.timestamp > 0) {
                const bearingAtual = calcularBearing(ultimoEnvio.lat, ultimoEnvio.lng, latitude, longitude);
                let diff = Math.abs(bearingAtual - ultimoEnvio.bearing);
                variacaoAngulo = Math.min(diff, 360 - diff);
            }
            
            let deveEnviar = false;
            if (ultimoEnvio.timestamp === 0) {
                deveEnviar = true; // primeira posição
            } else if (tempoDecorrido >= 60000) {
                deveEnviar = true; // 60 segundos
            } else if (variacaoAngulo >= 10 && (agora - ultimoEnvioPorAngulo) >= 10000) {
                deveEnviar = true; // mudança de direção >10° e há pelo menos 10s do último envio por ângulo
            }
            
            if (deveEnviar) {
                const dataHoraStr = new Date(agora).toLocaleString('pt-BR');
                const posObj = {
                    lat: latitude,
                    lng: longitude,
                    timestamp: agora,
                    accuracy: accuracy,
                    dataHora: dataHoraStr
                };
                posicaoRef.set(posObj);
                motoqueiroDB.localizacao = posObj;
                localStorage.setItem("rondaMotoqueiro", JSON.stringify(motoqueiroDB));
                atualizarStatusGPS(`Posição enviada: ${dataHoraStr} | Precisão: ${accuracy}m`, true);
                if (currentUser?.type === 'moto' && motoMap) atualizarMapaMoto(latitude, longitude);
                
                // Atualizar último envio
                ultimoEnvio = {
                    timestamp: agora,
                    lat: latitude,
                    lng: longitude,
                    bearing: variacaoAngulo === 0 ? 0 : calcularBearing(ultimoEnvio.lat, ultimoEnvio.lng, latitude, longitude)
                };
                if (variacaoAngulo >= 10) ultimoEnvioPorAngulo = agora;
                
                // Detecção automática de passagem
                for (let client of clientsDB) {
                    if (client.latCasa && client.lngCasa) {
                        const distancia = calcularDistancia(latitude, longitude, client.latCasa, client.lngCasa);
                        if (distancia <= 50) {
                            const ultimaPassagem = client.ultimaPassagem ? new Date(client.ultimaPassagem).getTime() : 0;
                            if (agora - ultimaPassagem > 60000) {
                                client.ultimaPassagem = agora;
                                if (!client.historicoPassagens) client.historicoPassagens = [];
                                client.historicoPassagens.unshift(dataHoraStr);
                                if (client.historicoPassagens.length > 20) client.historicoPassagens.pop();
                                motoqueiroDB.historicoRondasFeitas.unshift(`${client.endereco} - ${dataHoraStr}`);
                                if (motoqueiroDB.historicoRondasFeitas.length > 50) motoqueiroDB.historicoRondasFeitas.pop();
                                saveDB();
                                if (currentUser?.type === 'moto') atualizarHistoricoMoto();
                                console.log(`Passagem registrada para ${client.nome} - ${dataHoraStr}`);
                            }
                        }
                    }
                }
            }
        };
        
        // Iniciar watchPosition
        watchId = navigator.geolocation.watchPosition(
            (position) => {
                verificarEnvio(position);
            },
            (error) => {
                let msg = "";
                switch(error.code) {
                    case error.PERMISSION_DENIED: msg = "Permissão negada."; break;
                    case error.POSITION_UNAVAILABLE: msg = "Sinal GPS indisponível."; break;
                    case error.TIMEOUT: msg = "Tempo limite excedido."; break;
                    default: msg = "Erro desconhecido.";
                }
                atualizarStatusGPS(`Erro: ${msg}`, false);
            },
            { enableHighAccuracy: true, maximumAge: 0, timeout: 15000 }
        );
    }
    
    function pararRastreamentoMoto() {
        if (watchId) { navigator.geolocation.clearWatch(watchId); watchId = null; }
        atualizarStatusGPS("Rastreamento desativado.", false);
    }
    function atualizarStatusGPS(mensagem, isOk) {
        const div = document.getElementById("gpsStatus");
        if (div) {
            div.innerHTML = `<i class="fas ${isOk ? 'fa-check-circle' : 'fa-exclamation-triangle'}"></i> ${mensagem}`;
            div.className = `status-gps ${isOk ? 'ok' : 'erro'}`;
        }
        const horaDiv = document.getElementById("horaUltimaPosicao");
        if (horaDiv && motoqueiroDB && motoqueiroDB.localizacao) {
            const dataHora = motoqueiroDB.localizacao.dataHora || new Date(motoqueiroDB.localizacao.timestamp).toLocaleString('pt-BR');
            horaDiv.innerHTML = `<i class="fas fa-clock"></i> Última posição enviada: ${dataHora}`;
        }
    }
    function atualizarMapaMoto(lat, lng) {
        if (!motoMap) return;
        if (!motoMarker) motoMarker = L.marker([lat,lng], { icon: criarIconeMoto() }).addTo(motoMap).bindPopup("Sua posição").openPopup();
        else motoMarker.setLatLng([lat,lng]);
        motoMap.setView([lat,lng], 15);
    }
    function atualizarHistoricoMoto() {
        const container = document.getElementById("historicoMoto");
        if (container && motoqueiroDB) {
            container.innerHTML = motoqueiroDB.historicoRondasFeitas?.map(h => `<div><i class="fas fa-check-circle"></i> ${h}</div>`).join('') || "Nenhuma ronda registrada";
        }
    }

    // ========== TELAS DE AUTENTICAÇÃO ==========
    function renderAuthScreen() {
        const root = document.getElementById("appRoot");
        root.innerHTML = `
            <div class="auth-screen">
                <h2 style="text-align:center">Ronda Noturna</h2>
                <div style="display:flex; gap:10px; margin:20px 0;">
                    <button id="btnClienteLogin" style="flex:1;">Sou Cliente</button>
                    <button id="btnMotoLogin" style="flex:1;">Sou Motoqueiro</button>
                </div>
                <div id="loginFormCliente" class="hidden">
                    <input type="text" id="cliTelefone" placeholder="Telefone" />
                    <input type="password" id="cliSenha" placeholder="Senha" />
                    <button id="loginClienteBtn">Entrar</button>
                    <div class="toggle-auth" id="showRegCliente">Cadastrar cliente</div>
                </div>
                <div id="loginFormMoto" class="hidden">
                    <input type="text" id="motoNome" placeholder="Nome" />
                    <input type="password" id="motoSenha" placeholder="Senha" />
                    <button id="loginMotoBtn">Entrar</button>
                    <div class="toggle-auth" id="showRegMoto">Cadastrar motoqueiro</div>
                </div>
                <div id="regCliente" class="hidden">
                    <input type="text" id="regNome" placeholder="Nome" />
                    <input type="text" id="regTelefone" placeholder="Telefone" />
                    <input type="text" id="regEndereco" placeholder="Endereço" />
                    <input type="password" id="regSenha" placeholder="Senha" />
                    <button id="cadastrarClienteBtn">Cadastrar</button>
                    <div class="toggle-auth" id="backToLoginCliente">Voltar</div>
                </div>
                <div id="regMoto" class="hidden">
                    <input type="text" id="motoRegNome" placeholder="Nome" />
                    <input type="password" id="motoRegSenha" placeholder="Senha" />
                    <button id="cadastrarMotoBtn">Cadastrar</button>
                    <div class="toggle-auth" id="backToLoginMoto">Voltar</div>
                </div>
            </div>
        `;
        function showLogin(tipo) {
            document.getElementById("loginFormCliente").classList.toggle("hidden", tipo !== "cliente");
            document.getElementById("loginFormMoto").classList.toggle("hidden", tipo !== "moto");
            document.getElementById("regCliente").classList.add("hidden");
            document.getElementById("regMoto").classList.add("hidden");
        }
        function showRegister(tipo) {
            if(tipo === "cliente") {
                document.getElementById("loginFormCliente").classList.add("hidden");
                document.getElementById("regCliente").classList.remove("hidden");
            } else {
                document.getElementById("loginFormMoto").classList.add("hidden");
                document.getElementById("regMoto").classList.remove("hidden");
            }
        }
        document.getElementById("btnClienteLogin").onclick = () => showLogin("cliente");
        document.getElementById("btnMotoLogin").onclick = () => showLogin("moto");
        document.getElementById("loginClienteBtn").onclick = () => {
            const tel = document.getElementById("cliTelefone").value.trim();
            const senha = document.getElementById("cliSenha").value;
            const client = clientsDB.find(c => c.telefone === tel && c.senha === senha);
            if(client) { currentUser = { type: "client", data: client }; renderDashboardCliente(client); }
            else alert("Cliente não encontrado. Demo: 11999999999 / 123");
        };
        document.getElementById("loginMotoBtn").onclick = () => {
            const nome = document.getElementById("motoNome").value.trim();
            const senha = document.getElementById("motoSenha").value;
            if(motoqueiroDB && motoqueiroDB.nome === nome && motoqueiroDB.senha === senha) {
                currentUser = { type: "moto", data: motoqueiroDB };
                renderDashboardMoto(motoqueiroDB);
            } else alert("Motoqueiro não encontrado. Demo: Alex Moto / 123");
        };
        document.getElementById("showRegCliente").onclick = () => showRegister("cliente");
        document.getElementById("showRegMoto").onclick = () => showRegister("moto");
        document.getElementById("cadastrarClienteBtn").onclick = async () => {
            const nome = document.getElementById("regNome").value.trim();
            const tel = document.getElementById("regTelefone").value.trim();
            const end = document.getElementById("regEndereco").value.trim();
            const senha = document.getElementById("regSenha").value;
            if(!nome || !tel || !end || !senha) return alert("Preencha todos");
            if(clientsDB.find(c => c.telefone === tel)) return alert("Telefone já existe");
            const coords = await geocodificarEndereco(end);
            if (!coords) return alert("Não foi possível localizar o endereço. Verifique.");
            clientCoordsCache[end] = coords;
            clientsDB.push({
                id: Date.now().toString(), nome, telefone: tel, endereco: end, senha,
                ultimaPassagem: null, historicoPassagens: [],
                latCasa: coords.lat, lngCasa: coords.lng
            });
            saveDB();
            alert("Cadastrado! Faça login.");
            showLogin("cliente");
        };
        document.getElementById("cadastrarMotoBtn").onclick = () => {
            const nome = document.getElementById("motoRegNome").value.trim();
            const senha = document.getElementById("motoRegSenha").value;
            if(!nome || !senha) return;
            motoqueiroDB = { id: "m1", nome, senha, localizacao: { lat: -23.5505, lng: -46.6333, timestamp: Date.now() }, historicoRondasFeitas: [], alertas: [] };
            saveDB();
            alert("Motoqueiro cadastrado! Faça login.");
            showLogin("moto");
        };
        document.getElementById("backToLoginCliente").onclick = () => showLogin("cliente");
        document.getElementById("backToLoginMoto").onclick = () => showLogin("moto");
    }

    // ========== DASHBOARD CLIENTE (com marcador de casa e edição de endereço) ==========
    function renderDashboardCliente(client) {
        if(clientUpdateInterval) clearInterval(clientUpdateInterval);
        const root = document.getElementById("appRoot");
        root.innerHTML = `
            <div class="app-container">
                <div class="header">
                    <div class="logo"><h1><i class="fas fa-motorcycle"></i> Ronda Noturna</h1></div>
                    <div class="user-info">
                        <i class="fas fa-user"></i> ${client.nome}
                        <button class="editar-btn" id="editarEnderecoBtn"><i class="fas fa-edit"></i> Editar endereço</button>
                        <button class="logout-btn" id="logoutBtn">Sair</button>
                    </div>
                </div>
                <div class="dashboard">
                    <div class="card">
                        <h3><i class="fas fa-map-marked-alt"></i> Localização do Motoqueiro</h3>
                        <div id="mapContainer" class="map-container"></div>
                        <div class="info-hora" id="ultimaPosicaoHora">Última atualização: aguardando...</div>
                        <div class="ultima-passagem" id="ultimaPassagem">Última passagem: aguardando...</div>
                        <button class="panico-btn" id="panicoBtn"><i class="fas fa-bell"></i> Pânico - Acionar Motoqueiro</button>
                    </div>
                </div>
                <footer>Posição atualizada em tempo real. Ícone da casa mostra seu endereço.</footer>
            </div>
        `;
        if(clientMap) clientMap.remove();
        clientMap = L.map("mapContainer").setView([-23.5505, -46.6333], 13);
        L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png', { attribution: '&copy; OSM' }).addTo(clientMap);
        clientMarker = L.marker([-23.5505, -46.6333], { icon: criarIconeMoto() }).addTo(clientMap).bindPopup("Motoqueiro");
        
        // Adicionar marcador da casa (se existirem coordenadas)
        function atualizarMarcadorCasa() {
            if (casaMarker) casaMarker.remove();
            if (client.latCasa && client.lngCasa) {
                casaMarker = L.marker([client.latCasa, client.lngCasa], { icon: criarIconeCasa() }).addTo(clientMap)
                    .bindPopup(`<b>Sua casa</b><br>${client.endereco}`).openPopup();
                // Ajustar zoom para mostrar tanto a casa quanto a posição inicial
                const bounds = L.latLngBounds([[client.latCasa, client.lngCasa]]);
                clientMap.fitBounds(bounds);
            }
        }
        atualizarMarcadorCasa();

        // Atualizar última passagem
        function atualizarUltimaPassagem() {
            const ultima = client.ultimaPassagem ? new Date(client.ultimaPassagem).toLocaleString('pt-BR') : "Nenhuma passagem registrada ainda";
            document.getElementById("ultimaPassagem").innerHTML = `<i class="fas fa-clock"></i> Última passagem: ${ultima}`;
        }
        atualizarUltimaPassagem();

        // Atualizar posição da moto e data/hora
        posicaoRef.on('value', async (snapshot) => {
            const pos = snapshot.val();
            if (pos && pos.lat && pos.lng) {
                clientMarker.setLatLng([pos.lat, pos.lng]);
                clientMap.setView([pos.lat, pos.lng], 14);
                if (pos.dataHora) {
                    document.getElementById("ultimaPosicaoHora").innerHTML = `<i class="fas fa-sync-alt"></i> Última atualização: ${pos.dataHora}`;
                } else {
                    const dataHora = new Date(pos.timestamp).toLocaleString('pt-BR');
                    document.getElementById("ultimaPosicaoHora").innerHTML = `<i class="fas fa-sync-alt"></i> Última atualização: ${dataHora}`;
                }
                // Atualizar popup da moto com endereço aproximado
                const enderecoMoto = await obterEnderecoAproximado(pos.lat, pos.lng);
                clientMarker.bindPopup(`<b>Motoqueiro</b><br>${enderecoMoto}`).openPopup();
            }
            // Verificar se a última passagem do cliente foi atualizada
            const updatedClient = clientsDB.find(c => c.id === client.id);
            if (updatedClient && updatedClient.ultimaPassagem !== client.ultimaPassagem) {
                client.ultimaPassagem = updatedClient.ultimaPassagem;
                client.historicoPassagens = updatedClient.historicoPassagens;
                atualizarUltimaPassagem();
            }
        });

        // Editar endereço
        document.getElementById("editarEnderecoBtn").onclick = async () => {
            const novoEnd = prompt("Digite seu novo endereço completo:", client.endereco);
            if (novoEnd && novoEnd.trim() !== "") {
                const coords = await geocodificarEndereco(novoEnd);
                if (!coords) {
                    alert("Endereço não encontrado. Verifique e tente novamente.");
                    return;
                }
                client.endereco = novoEnd.trim();
                client.latCasa = coords.lat;
                client.lngCasa = coords.lng;
                clientCoordsCache[novoEnd] = coords;
                const idx = clientsDB.findIndex(c => c.id === client.id);
                if (idx !== -1) clientsDB[idx] = client;
                saveDB();
                atualizarMarcadorCasa();
                alert("Endereço atualizado! O marcador da casa foi reposicionado.");
            }
        };
        document.getElementById("logoutBtn").onclick = () => { currentUser = null; renderAuthScreen(); };
        document.getElementById("panicoBtn").onclick = () => {
            alert("Pânico acionado! O motoqueiro foi notificado.");
            if(motoqueiroDB) {
                if(!motoqueiroDB.alertas) motoqueiroDB.alertas = [];
                motoqueiroDB.alertas.push({ cliente: client.nome, endereco: client.endereco, horario: new Date().toLocaleTimeString() });
                saveDB();
            }
        };
    }

    // ========== DASHBOARD MOTOQUEIRO ==========
    function renderDashboardMoto(moto) {
        if(clientUpdateInterval) clearInterval(clientUpdateInterval);
        loadDB();
        const root = document.getElementById("appRoot");
        root.innerHTML = `
            <div class="app-container">
                <div class="header">
                    <div class="logo"><h1><i class="fas fa-motorcycle"></i> Painel Motoqueiro</h1></div>
                    <div class="user-info"><i class="fas fa-user-astronaut"></i> ${moto.nome}<button class="logout-btn" id="logoutMotoBtn">Sair</button></div>
                </div>
                <div class="dashboard">
                    <div class="card">
                        <h3><i class="fas fa-satellite-dish"></i> Minha Localização (envio a cada 60s ou >10°)</h3>
                        <div id="motoMapContainer" class="map-container"></div>
                        <div id="gpsStatus" class="status-gps">Inicializando...</div>
                        <div id="horaUltimaPosicao" class="info-hora"></div>
                        <button id="pararRastreamentoBtn" style="background:#ef4444; width:100%; padding:8px; border:none; border-radius:40px; margin-top:8px;">Desativar GPS</button>
                        <button id="reiniciarRastreamentoBtn" style="background:#22c55e; width:100%; padding:8px; border:none; border-radius:40px; margin-top:8px;">Ativar GPS</button>
                    </div>
                    <div class="card">
                        <h3><i class="fas fa-bell"></i> Alertas de pânico</h3>
                        <div id="alertasPanico">${moto.alertas?.length ? moto.alertas.map(a => `<div style="background:#1e293b; padding:8px; border-radius:16px; margin-bottom:8px; border-left:3px solid red;"><i class="fas fa-exclamation-circle"></i> ${a.cliente} - ${a.endereco} às ${a.horario} <button class="responderAlerta" data-end="${a.endereco}" style="margin-left:10px;">Atender</button></div>`).join('') : "<p>Nenhum alerta</p>"}</div>
                    </div>
                    <div class="card">
                        <h3><i class="fas fa-history"></i> Histórico de rondas realizadas (automático)</h3>
                        <div id="historicoMoto" style="max-height:200px; overflow-y:auto;">${moto.historicoRondasFeitas?.map(h => `<div><i class="fas fa-check-circle"></i> ${h}</div>`).join('') || "Nenhuma ronda registrada"}</div>
                    </div>
                </div>
                <footer>GPS envia posição a cada 60s ou quando muda direção >10°. Passagens registradas automaticamente ao passar a menos de 50m do endereço do cliente.</footer>
            </div>
        `;
        if(motoMap) motoMap.remove();
        motoMap = L.map("motoMapContainer").setView([moto.localizacao.lat, moto.localizacao.lng], 15);
        L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png').addTo(motoMap);
        motoMarker = L.marker([moto.localizacao.lat, moto.localizacao.lng], { icon: criarIconeMoto() }).addTo(motoMap).bindPopup("Sua posição");
        
        // Atualizar popup da moto com endereço aproximado
        (async () => {
            const endereco = await obterEnderecoAproximado(moto.localizacao.lat, moto.localizacao.lng);
            motoMarker.bindPopup(`<b>Sua posição</b><br>${endereco}`).openPopup();
        })();
        
        document.getElementById("pararRastreamentoBtn").onclick = () => pararRastreamentoMoto();
        document.getElementById("reiniciarRastreamentoBtn").onclick = () => { pararRastreamentoMoto(); iniciarRastreamentoMoto(); };
        document.getElementById("logoutMotoBtn").onclick = () => { pararRastreamentoMoto(); currentUser = null; renderAuthScreen(); };
        document.querySelectorAll(".responderAlerta").forEach(btn => {
            btn.onclick = () => {
                const end = btn.getAttribute("data-end");
                alert(`Atendendo alerta em ${end}`);
                moto.alertas = moto.alertas.filter(a => a.endereco !== end);
                saveDB();
                renderDashboardMoto(moto);
            };
        });
        if (!watchId && moto.rastreamentoAtivo !== false) iniciarRastreamentoMoto();
        // Atualizar histórico e hora periodicamente
        setInterval(() => {
            loadDB();
            atualizarHistoricoMoto();
            if (motoqueiroDB && motoqueiroDB.localizacao) {
                const dataHora = motoqueiroDB.localizacao.dataHora || new Date(motoqueiroDB.localizacao.timestamp).toLocaleString('pt-BR');
                const horaDiv = document.getElementById("horaUltimaPosicao");
                if (horaDiv) horaDiv.innerHTML = `<i class="fas fa-clock"></i> Última posição enviada: ${dataHora}`;
            }
        }, 5000);
    }

    // Inicialização
    (async () => {
        await loadDB();
        renderAuthScreen();
    })();
</script>
</body>
</html>
